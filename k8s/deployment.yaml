apiVersion: apps/v1
kind: Deployment
metadata:
  name: armies-docs
  namespace: websites
  labels:
    app: armies-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: armies-docs
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: armies-docs
    spec:
      containers:
        - name: nginx
          image: ghcr.io/petersimmons1972/armies-docs:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
