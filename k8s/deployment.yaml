apiVersion: v1
kind: ServiceAccount
metadata:
  # Dedicated zero-permission SA for the static docs pod. The pod never
  # calls the Kubernetes API, so this SA has no RoleBindings anywhere.
  # Using a dedicated SA (vs. the namespace default) contains blast radius
  # if the SA ever gets accidentally bound.
  name: armies-docs
  namespace: websites
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: armies-docs
  namespace: websites
  labels:
    app: armies-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: armies-docs
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: armies-docs
    spec:
      serviceAccountName: armies-docs
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: nginx
          # CONTRACT: this :latest reference is the seed image used only on
          # an initial `kubectl apply`. The deploy-docs.yml workflow
          # immediately overrides it with a digest-pinned reference
          # (`@sha256:<digest>` from docker/build-push-action output) via
          # `kubectl set image`, so the live Deployment never runs an
          # unverified :latest in steady state.
          # See GitHub issue #55.
          image: ghcr.io/petersimmons1972/armies-docs:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
