<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <defs>
    <!-- Subtle vignette for depth -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0F172A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#020810" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Left panel panel fill -->
    <linearGradient id="left-panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <!-- Right panel fill -->
    <linearGradient id="right-panel-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f38"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <!-- Gold shimmer for center divider -->
    <linearGradient id="gold-divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#D4A574" stop-opacity="1"/>
      <stop offset="70%" stop-color="#D4A574" stop-opacity="1"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BACKGROUND                                                   -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect width="900" height="440" fill="#0F172A"/>

  <!-- Left panel tint -->
  <rect x="0" y="0" width="449" height="440" fill="url(#left-panel-bg)"/>
  <!-- Right panel tint -->
  <rect x="451" y="0" width="449" height="440" fill="url(#right-panel-bg)"/>

  <!-- Structural grid lines — Cassandre underpinning -->
  <line x1="0" y1="70" x2="900" y2="70" stroke="#1e293b" stroke-width="1" opacity="0.8"/>
  <line x1="0" y1="400" x2="900" y2="400" stroke="#1e293b" stroke-width="1" opacity="0.8"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- HEADER                                                       -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- Gold rule flanking heading -->
  <rect x="180" y="16" width="180" height="2" fill="#D4A574" opacity="0.7"/>
  <rect x="540" y="16" width="180" height="2" fill="#D4A574" opacity="0.7"/>

  <!-- Heading diamonds -->
  <polygon points="370,17 376,12 382,17 376,22" fill="#D4A574" opacity="0.9"/>
  <polygon points="518,17 524,12 530,17 524,22" fill="#D4A574" opacity="0.9"/>

  <text x="450" y="45"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="22" font-weight="bold" letter-spacing="5"
        text-anchor="middle" fill="#f8fafc">THE LOAD-BEARING LINE</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- CENTER GOLD DIVIDER                                          -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="449" y="72" width="2" height="328" fill="url(#gold-divider)"/>
  <!-- Diamond accent at midpoint of divider -->
  <polygon points="450,234 456,228 450,222 444,228" fill="#D4A574"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- LEFT PANEL — STRENGTHS ONLY (THE WRONG WAY)                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="225" y="95"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="14" font-weight="bold" letter-spacing="3"
        text-anchor="middle" fill="#94a3b8">STRENGTHS ONLY</text>

  <!-- Horizontal rule under label -->
  <line x1="130" y1="103" x2="320" y2="103" stroke="#334155" stroke-width="1"/>

  <!-- Plinth / Pedestal — geometric Cassandre block -->
  <!-- Base platform -->
  <rect x="155" y="318" width="140" height="20" fill="#1e293b"/>
  <!-- Pedestal column -->
  <rect x="170" y="248" width="110" height="72" fill="#1e293b"/>
  <!-- Pedestal cap -->
  <rect x="162" y="243" width="126" height="8" fill="#263548"/>

  <!-- Generic idealized figure — perfectly symmetrical silhouette, grey flat -->
  <!-- Head — perfect circle -->
  <circle cx="225" cy="195" r="28" fill="#334155"/>
  <!-- Neck -->
  <rect x="218" y="222" width="14" height="12" fill="#334155"/>
  <!-- Shoulders — perfectly level, geometric -->
  <rect x="175" y="232" width="100" height="14" rx="2" fill="#334155"/>
  <!-- Torso — rectangular, idealized -->
  <rect x="192" y="245" width="66" height="52" fill="#334155"/>
  <!-- Arms — perfectly equal -->
  <rect x="174" y="234" width="18" height="58" rx="3" fill="#334155"/>
  <rect x="258" y="234" width="18" height="58" rx="3" fill="#334155"/>
  <!-- Legs — perfectly parallel -->
  <rect x="197" y="296" width="24" height="46" fill="#334155"/>
  <rect x="229" y="296" width="24" height="46" fill="#334155"/>

  <!-- "Perfect" symmetry accent — tiny geometric marks at shoulders to indicate idealization -->
  <line x1="193" y1="232" x2="193" y2="226" stroke="#475569" stroke-width="1.5"/>
  <line x1="257" y1="232" x2="257" y2="226" stroke="#475569" stroke-width="1.5"/>

  <!-- Attribute labels below plinth -->
  <text x="225" y="358"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="11" font-style="italic"
        text-anchor="middle" fill="#475569">"BRILLIANT STRATEGIST"</text>
  <text x="225" y="374"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="11" font-style="italic"
        text-anchor="middle" fill="#475569">"STRONG LEADER"</text>

  <!-- A TYPE verdict -->
  <text x="225" y="415"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="20" font-weight="bold" letter-spacing="4"
        text-anchor="middle" fill="#ef4444">A TYPE</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- RIGHT PANEL — STRENGTHS + FAILURE MODE (THE RIGHT WAY)      -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Panel label -->
  <text x="675" y="95"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="14" font-weight="bold" letter-spacing="2"
        text-anchor="middle" fill="#D4A574">STRENGTHS + FAILURE MODE</text>

  <!-- Horizontal rule under label -->
  <line x1="530" y1="103" x2="820" y2="103" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Plinth / Pedestal — slightly brighter -->
  <!-- Base platform -->
  <rect x="605" y="318" width="140" height="20" fill="#1e3a5f"/>
  <!-- Pedestal column -->
  <rect x="620" y="248" width="110" height="72" fill="#1e3a5f"/>
  <!-- Pedestal cap -->
  <rect x="612" y="243" width="126" height="8" fill="#254a72"/>

  <!-- Human figure — cream, same structure but with asymmetry (more human) -->
  <!-- Head — very slightly off-center tilt suggests thought/personality -->
  <ellipse cx="677" cy="195" rx="27" ry="28" fill="#f8fafc"/>
  <!-- Neck -->
  <rect x="670" y="222" width="12" height="12" fill="#f8fafc"/>
  <!-- Shoulders — left slightly higher (asymmetric) -->
  <polygon points="626,236 724,238 722,246 728,248 624,248 622,244" fill="#f8fafc"/>
  <!-- Left shoulder raised slightly — asymmetric human trait -->
  <rect x="626" y="232" width="20" height="6" rx="2" fill="#f8fafc"/>
  <!-- Torso -->
  <rect x="644" y="245" width="66" height="52" fill="#f8fafc"/>
  <!-- Arms — slight asymmetry: left arm slightly different angle -->
  <rect x="625" y="236" width="18" height="54" rx="3" fill="#f8fafc" transform="rotate(-2 634 248)"/>
  <rect x="709" y="238" width="18" height="58" rx="3" fill="#f8fafc"/>
  <!-- Legs -->
  <rect x="649" y="296" width="24" height="46" fill="#f8fafc"/>
  <rect x="681" y="296" width="24" height="46" fill="#f8fafc"/>

  <!-- Small amber accent dot on right shoulder — the "failure mark" that makes them real -->
  <circle cx="718" cy="238" r="4" fill="#fbbf24"/>

  <!-- Attribute labels below plinth -->
  <text x="675" y="358"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="11"
        text-anchor="middle" fill="#f8fafc">"SPOKE LAST IN MEETINGS"</text>
  <text x="675" y="374"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="11" font-weight="bold"
        text-anchor="middle" fill="#fbbf24">"SLOW AT FALAISE GAP"</text>

  <!-- A PERSON verdict -->
  <text x="675" y="415"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="20" font-weight="bold" letter-spacing="4"
        text-anchor="middle" fill="#22c55e">A PERSON</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- VIGNETTE OVERLAY                                             -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect width="900" height="440" fill="url(#vignette)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- BOTTOM CAPTION                                               -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <text x="450" y="430"
        font-family="'Georgia', 'Times New Roman', serif"
        font-size="11" font-style="italic"
        text-anchor="middle" fill="#94a3b8">The failure mode is not decoration. It is what distinguishes a person from a type.</text>

</svg>
