<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500">
  <title>Field Manual Cover — Armies Getting Started Guide</title>
  <desc>WWII field manual cover design: olive drab and khaki, brass hardware details, depicting the armies init → spawn → record cycle as a soldier's pocket guide. Olive green, khaki, brass palette.</desc>

  <!-- Outer card background — olive drab -->
  <rect width="700" height="500" fill="#3d4a1a"/>

  <!-- Worn leather texture suggestion -->
  <rect x="0" y="0" width="700" height="500" fill="none" stroke="#2a3010" stroke-width="6"/>
  <rect x="6" y="6" width="688" height="488" fill="none" stroke="#4a5820" stroke-width="1"/>

  <!-- Inner paper area -->
  <rect x="30" y="30" width="640" height="440" fill="#d4c585" rx="2"/>
  <rect x="30" y="30" width="640" height="440" fill="none" stroke="#a09040" stroke-width="1"/>

  <!-- Top classification stripe -->
  <rect x="30" y="30" width="640" height="30" fill="#8b6010"/>
  <text x="350" y="51" font-family="serif" font-size="20.8" font-weight="bold" fill="#d4c585" text-anchor="middle" letter-spacing="6">FIELD MANUAL</text>

  <!-- Document number top right -->
  <text x="655" y="51" font-family="monospace" font-size="18" fill="#d4c585" text-anchor="end" opacity="0.8">FM 1-00</text>

  <!-- Bottom classification stripe -->
  <rect x="30" y="440" width="640" height="30" fill="#8b6010"/>
  <text x="350" y="459" font-family="serif" font-size="20" font-weight="bold" fill="#d4c585" text-anchor="middle" letter-spacing="4">ARMIES COORDINATION ENGINE</text>

  <!-- Main content area background -->
  <rect x="50" y="76" width="600" height="348" fill="#c8b870" opacity="0.3"/>

  <!-- Eagle/emblem at top center -->
  <!-- Simplified military eagle silhouette -->
  <g transform="translate(350,130)" fill="#5a4010">
    <!-- Wings spread -->
    <path d="M 0,-15 L -80,-5 L -60,10 L -30,5 L 0,15 L 30,5 L 60,10 L 80,-5 Z" opacity="0.9"/>
    <!-- Body -->
    <ellipse cx="0" cy="5" rx="18" ry="20" opacity="0.9"/>
    <!-- Head -->
    <circle cx="0" cy="-18" r="12" opacity="0.9"/>
    <!-- Beak -->
    <polygon points="0,-12 10,-18 6,-22" opacity="0.9"/>
    <!-- Tail feathers -->
    <path d="M -14,20 L -8,38 L 0,28 L 8,38 L 14,20" opacity="0.8"/>
    <!-- Shield on chest -->
    <rect x="-8" y="-2" width="16" height="18" rx="1" fill="#8b6010"/>
    <!-- Shield stripes -->
    <rect x="-8" y="-2" width="16" height="4" fill="#d4c585" opacity="0.8"/>
    <rect x="-8" y="6" width="16" height="4" fill="#d4c585" opacity="0.8"/>
    <rect x="-8" y="14" width="16" height="4" fill="#d4c585" opacity="0.8"/>
    <!-- Talons holding scrolls -->
    <path d="M -18,22 L -30,30 L -22,34 L -14,26" opacity="0.8"/>
    <path d="M 18,22 L 30,30 L 22,34 L 14,26" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="350" y="200" font-family="serif" font-size="57.6" font-weight="bold" fill="#3a2800" text-anchor="middle" letter-spacing="4">GETTING</text>
  <text x="350" y="240" font-family="serif" font-size="57.6" font-weight="bold" fill="#3a2800" text-anchor="middle" letter-spacing="4">STARTED</text>

  <!-- Decorative rule under title -->
  <rect x="140" y="250" width="420" height="3" fill="#8b6010"/>
  <rect x="140" y="255" width="420" height="1" fill="#8b6010" opacity="0.4"/>

  <!-- The 5-step process as a compact list with military numbering -->
  <g font-family="monospace" font-size="24" fill="#3a2800">
    <text x="170" y="285">1.  pip install armies</text>
    <text x="170" y="305">2.  armies init</text>
    <text x="170" y="325">3.  cp grace-hopper.md ~/.armies/profiles/</text>
    <text x="170" y="345">4.  armies spawn grace-hopper --role implementer</text>
    <text x="170" y="365">5.  armies record grace-hopper "mission complete"</text>
  </g>

  <!-- Step bullets/markers -->
  <g fill="#8b6010">
    <rect x="155" y="276" width="8" height="12" rx="1"/>
    <rect x="155" y="296" width="8" height="12" rx="1"/>
    <rect x="155" y="316" width="8" height="12" rx="1"/>
    <rect x="155" y="336" width="8" height="12" rx="1"/>
    <rect x="155" y="356" width="8" height="12" rx="1"/>
  </g>

  <!-- Divider and subtitle -->
  <rect x="140" y="378" width="420" height="1" fill="#8b6010" opacity="0.5"/>
  <text x="350" y="397" font-family="serif" font-size="20" fill="#5a4010" text-anchor="middle" letter-spacing="3" font-style="italic">Zero to first spawn — narrative walkthrough</text>

  <!-- Corner stamps/seals -->
  <!-- Top left corner: UNCLASSIFIED stamp -->
  <g transform="translate(60,78)">
    <rect x="0" y="0" width="80" height="22" fill="none" stroke="#2a5a00" stroke-width="1.5" rx="2"/>
    <text x="40" y="15" font-family="sans-serif" font-size="20" font-weight="bold" fill="#2a5a00" text-anchor="middle" letter-spacing="2">UNCLASSIFIED</text>
  </g>

  <!-- Top right corner: date/version -->
  <text x="648" y="90" font-family="monospace" font-size="20" fill="#5a4010" text-anchor="end" opacity="0.7">REV. 1.0</text>
  <text x="648" y="100" font-family="monospace" font-size="20" fill="#5a4010" text-anchor="end" opacity="0.7">2026-03</text>

  <!-- Bottom left: "See also" reference -->
  <text x="52" y="432" font-family="sans-serif" font-size="20" fill="#5a4010" opacity="0.8">See: how-it-works.md | creating-profiles.md</text>

  <!-- Notebook wire binding simulation on left edge -->
  <g fill="none" stroke="#6a6030" stroke-width="2" opacity="0.6">
    <circle cx="30" cy="80" r="5"/>
    <circle cx="30" cy="120" r="5"/>
    <circle cx="30" cy="160" r="5"/>
    <circle cx="30" cy="200" r="5"/>
    <circle cx="30" cy="240" r="5"/>
    <circle cx="30" cy="280" r="5"/>
    <circle cx="30" cy="320" r="5"/>
    <circle cx="30" cy="360" r="5"/>
    <circle cx="30" cy="400" r="5"/>
    <circle cx="30" cy="440" r="5"/>
  </g>

</svg>
