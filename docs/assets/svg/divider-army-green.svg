<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <title>Decorative Section Divider — Army Green</title>
  <desc>WWII field manual style decorative horizontal divider in olive green. Used in getting-started and creating-profiles pages.</desc>
  <rect width="800" height="40" fill="transparent"/>
  <line x1="0" y1="20" x2="800" y2="20" stroke="#4a5820" stroke-width="2" opacity="0.8"/>
  <line x1="0" y1="17" x2="800" y2="17" stroke="#4a5820" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="23" x2="800" y2="23" stroke="#4a5820" stroke-width="0.5" opacity="0.3"/>
  <!-- Center chevron -->
  <path d="M 385,12 L 400,22 L 415,12" fill="none" stroke="#4a5820" stroke-width="1.5"/>
  <path d="M 378,16 L 400,26 L 422,16" fill="none" stroke="#4a5820" stroke-width="1" opacity="0.5"/>
  <!-- Flanking bullets -->
  <circle cx="330" cy="20" r="3" fill="#4a5820" opacity="0.6"/>
  <circle cx="470" cy="20" r="3" fill="#4a5820" opacity="0.6"/>
  <circle cx="200" cy="20" r="2" fill="#4a5820" opacity="0.3"/>
  <circle cx="600" cy="20" r="2" fill="#4a5820" opacity="0.3"/>
</svg>
