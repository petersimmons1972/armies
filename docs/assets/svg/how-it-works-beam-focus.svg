<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <title>Tune the Beam — Specificity in Profile Writing</title>
  <defs>

    <!-- LEFT: vague beam — wide diffuse gold, very faint -->
    <linearGradient id="beam-vague" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#D4A574" stop-opacity="0.05"/>
      <stop offset="60%" stop-color="#D4A574" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0.15"/>
    </linearGradient>

    <!-- RIGHT: specific beam — narrow bright gold -->
    <linearGradient id="beam-specific" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#D4A574" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#D4A574" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0.4"/>
    </linearGradient>

    <!-- Fuzzy blur for vague output target -->
    <filter id="blur-output" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>

    <!-- Mild glow on Eisenhower silhouette -->
    <filter id="ike-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Vague lens gradient (muted) -->
    <radialGradient id="lens-vague" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#334155" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.6"/>
    </radialGradient>

    <!-- Specific lens gradient (gold) -->
    <radialGradient id="lens-specific" cx="35%" cy="35%" r="60%">
      <stop offset="0%"  stop-color="#f0c080" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b08040" stop-opacity="0.7"/>
    </radialGradient>

    <!-- Subtle horizontal scan lines for panel texture -->
    <pattern id="scanlines" x="0" y="0" width="2" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="2" height="1" fill="#ffffff" opacity="0.015"/>
    </pattern>

  </defs>

  <!-- ═══════════════════════════════════════════════
       BACKGROUND
  ════════════════════════════════════════════════ -->
  <rect width="900" height="420" fill="#0F172A"/>
  <rect width="900" height="420" fill="url(#scanlines)"/>

  <!-- Outer poster frame — double rule, Cassandre signature -->
  <rect x="0"  y="0"  width="900" height="420" fill="none" stroke="#D4A574" stroke-width="3"/>
  <rect x="7"  y="7"  width="886" height="406" fill="none" stroke="#D4A574" stroke-width="0.5" opacity="0.35"/>

  <!-- Top band -->
  <rect x="0" y="0" width="900" height="42" fill="#0a0f1e"/>

  <!-- ═══════════════════════════════════════════════
       TOP HEADING — TUNE THE BEAM
  ════════════════════════════════════════════════ -->
  <text x="450" y="28" font-family="'Arial Narrow', Arial, sans-serif" font-size="24"
        font-weight="bold" fill="#f8fafc" text-anchor="middle" letter-spacing="12">
    TUNE THE BEAM
  </text>

  <!-- Decorative diamond ornament beneath heading -->
  <polygon points="450,39  456,45  450,51  444,45" fill="#D4A574" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════
       CENTER DIVIDER — thin vertical rule
  ════════════════════════════════════════════════ -->
  <line x1="450" y1="56" x2="450" y2="370" stroke="#1e293b" stroke-width="1.5"/>

  <!-- ═══════════════════════════════════════════════
       LEFT PANEL — VAGUE PROFILE (wide diffuse beam)
  ════════════════════════════════════════════════ -->

  <!-- Panel background tint — very subtle -->
  <rect x="3" y="56" width="441" height="314" fill="#0d1420" opacity="0.3"/>

  <!-- Grid lines — architectural precision, Cassandre -->
  <g stroke="#1a2540" stroke-width="0.5" fill="none" opacity="0.6">
    <line x1="20"  y1="60"  x2="20"  y2="370"/>
    <line x1="80"  y1="60"  x2="80"  y2="370"/>
    <line x1="140" y1="60"  x2="140" y2="370"/>
    <line x1="200" y1="60"  x2="200" y2="370"/>
    <line x1="260" y1="60"  x2="260" y2="370"/>
    <line x1="320" y1="60"  x2="320" y2="370"/>
    <line x1="380" y1="60"  x2="380" y2="370"/>
    <line x1="20"  y1="100" x2="440" y2="100"/>
    <line x1="20"  y1="160" x2="440" y2="160"/>
    <line x1="20"  y1="220" x2="440" y2="220"/>
    <line x1="20"  y1="280" x2="440" y2="280"/>
    <line x1="20"  y1="340" x2="440" y2="340"/>
  </g>

  <!-- VAGUE label above lens -->
  <text x="100" y="92" font-family="'Arial Narrow', Arial, sans-serif" font-size="13"
        font-weight="bold" fill="#94a3b8" text-anchor="middle" letter-spacing="6">
    VAGUE
  </text>
  <line x1="60" y1="96" x2="140" y2="96" stroke="#475569" stroke-width="0.8" opacity="0.7"/>

  <!-- Lens source circle — muted slate, left side -->
  <circle cx="100" cy="210" r="40" fill="url(#lens-vague)" stroke="#475569" stroke-width="1.5"/>
  <!-- Inner lens detail rings -->
  <circle cx="100" cy="210" r="32" fill="none" stroke="#334155" stroke-width="0.8" opacity="0.7"/>
  <circle cx="100" cy="210" r="22" fill="none" stroke="#334155" stroke-width="0.6" opacity="0.5"/>
  <circle cx="100" cy="210" r="10" fill="#1e293b" stroke="#475569" stroke-width="0.8"/>
  <!-- Lens aperture cross-hairs -->
  <line x1="100" y1="190" x2="100" y2="230" stroke="#475569" stroke-width="0.6" opacity="0.5"/>
  <line x1="80"  y1="210" x2="120" y2="210" stroke="#475569" stroke-width="0.6" opacity="0.5"/>
  <!-- Beam emission notch marks on lens rim -->
  <line x1="137" y1="183" x2="145" y2="177" stroke="#475569" stroke-width="0.8" opacity="0.5"/>
  <line x1="140" y1="210" x2="150" y2="210" stroke="#475569" stroke-width="1.0" opacity="0.6"/>
  <line x1="137" y1="237" x2="145" y2="243" stroke="#475569" stroke-width="0.8" opacity="0.5"/>

  <!-- WIDE beam triangle — ~80° spread, very faint gold fill -->
  <!-- Lens edge at x=140, center at y=210. Wide cone opens to x=430 -->
  <!-- Top edge: 80° total = 40° each side from center axis -->
  <!-- At x=430 (290px from lens), spread = 290 * tan(40°) ≈ 243px each way → y=210±243 (clipped to panel) -->
  <polygon
    points="140,210  430,80  430,340"
    fill="url(#beam-vague)"
  />
  <!-- Beam edge rays — hard geometric lines, barely visible -->
  <line x1="140" y1="210" x2="430" y2="80"  stroke="#475569" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="210" x2="430" y2="340" stroke="#475569" stroke-width="0.7" opacity="0.4"/>
  <!-- Secondary interior rays — Cassandre ray motif -->
  <line x1="140" y1="210" x2="430" y2="130" stroke="#334155" stroke-width="0.4" opacity="0.3"/>
  <line x1="140" y1="210" x2="430" y2="290" stroke="#334155" stroke-width="0.4" opacity="0.3"/>

  <!-- BLURRY output target — right end of vague beam -->
  <!-- Fuzzy concentric circles, soft and undefined -->
  <circle cx="400" cy="210" r="55" fill="#334155" opacity="0.12" filter="url(#blur-output)"/>
  <circle cx="400" cy="210" r="38" fill="#334155" opacity="0.18" filter="url(#blur-output)"/>
  <circle cx="400" cy="210" r="22" fill="#475569" opacity="0.20" filter="url(#blur-output)"/>
  <!-- Additional blur halo rings for softness -->
  <circle cx="400" cy="210" r="60" fill="none" stroke="#475569" stroke-width="2" opacity="0.08" filter="url(#blur-output)"/>

  <!-- GENERIC OUTPUT label — right end -->
  <text x="400" y="305" font-family="'Arial Narrow', Arial, sans-serif" font-size="11"
        fill="#475569" text-anchor="middle" letter-spacing="3" opacity="0.85">
    GENERIC OUTPUT
  </text>

  <!-- Angle annotation bracket — indicates wide spread -->
  <path d="M 180,140 A 70,70 0 0,0 180,280" fill="none" stroke="#334155" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <text x="172" y="205" font-family="'Arial Narrow', Arial, sans-serif" font-size="9"
        fill="#475569" text-anchor="middle" letter-spacing="1" opacity="0.55">
    80°
  </text>

  <!-- ═══════════════════════════════════════════════
       RIGHT PANEL — SPECIFIC PROFILE (narrow focused beam)
  ════════════════════════════════════════════════ -->

  <!-- Panel background tint — warmer than left -->
  <rect x="452" y="56" width="441" height="314" fill="#100d06" opacity="0.3"/>

  <!-- Grid lines — right panel -->
  <g stroke="#1a1a10" stroke-width="0.5" fill="none" opacity="0.6">
    <line x1="470" y1="60"  x2="470" y2="370"/>
    <line x1="530" y1="60"  x2="530" y2="370"/>
    <line x1="590" y1="60"  x2="590" y2="370"/>
    <line x1="650" y1="60"  x2="650" y2="370"/>
    <line x1="710" y1="60"  x2="710" y2="370"/>
    <line x1="770" y1="60"  x2="770" y2="370"/>
    <line x1="830" y1="60"  x2="830" y2="370"/>
    <line x1="460" y1="100" x2="890" y2="100"/>
    <line x1="460" y1="160" x2="890" y2="160"/>
    <line x1="460" y1="220" x2="890" y2="220"/>
    <line x1="460" y1="280" x2="890" y2="280"/>
    <line x1="460" y1="340" x2="890" y2="340"/>
  </g>

  <!-- SPECIFIC label above lens -->
  <text x="800" y="92" font-family="'Arial Narrow', Arial, sans-serif" font-size="13"
        font-weight="bold" fill="#D4A574" text-anchor="middle" letter-spacing="6">
    SPECIFIC
  </text>
  <line x1="756" y1="96" x2="844" y2="96" stroke="#D4A574" stroke-width="0.8" opacity="0.7"/>

  <!-- Lens source circle — gold, right side -->
  <circle cx="800" cy="210" r="40" fill="url(#lens-specific)" stroke="#D4A574" stroke-width="1.8"/>
  <!-- Inner lens detail rings -->
  <circle cx="800" cy="210" r="32" fill="none" stroke="#b8873a" stroke-width="0.8" opacity="0.7"/>
  <circle cx="800" cy="210" r="22" fill="none" stroke="#b8873a" stroke-width="0.6" opacity="0.5"/>
  <circle cx="800" cy="210" r="10" fill="#6b4a18" stroke="#D4A574" stroke-width="1.0"/>
  <!-- Lens aperture cross-hairs — gold -->
  <line x1="800" y1="190" x2="800" y2="230" stroke="#D4A574" stroke-width="0.7" opacity="0.6"/>
  <line x1="780" y1="210" x2="820" y2="210" stroke="#D4A574" stroke-width="0.7" opacity="0.6"/>
  <!-- Diagonal aperture lines — Cassandre mechanical lens detail -->
  <line x1="786" y1="196" x2="814" y2="224" stroke="#D4A574" stroke-width="0.5" opacity="0.4"/>
  <line x1="814" y1="196" x2="786" y2="224" stroke="#D4A574" stroke-width="0.5" opacity="0.4"/>
  <!-- Beam emission notch marks on lens rim -->
  <line x1="762" y1="183" x2="754" y2="177" stroke="#D4A574" stroke-width="0.9" opacity="0.6"/>
  <line x1="760" y1="210" x2="750" y2="210" stroke="#D4A574" stroke-width="1.1" opacity="0.75"/>
  <line x1="762" y1="237" x2="754" y2="243" stroke="#D4A574" stroke-width="0.9" opacity="0.6"/>

  <!-- NARROW beam triangle — ~15° spread, bright gold fill -->
  <!-- Lens edge at x=760, center at y=210. Narrow cone opens LEFT to x=475 -->
  <!-- At x=475 (285px from lens), spread = 285 * tan(7.5°) ≈ 37px each way → y=210±37 -->
  <polygon
    points="760,210  475,173  475,247"
    fill="url(#beam-specific)"
  />
  <!-- Beam edge rays — crisp hard gold lines -->
  <line x1="760" y1="210" x2="475" y2="173" stroke="#D4A574" stroke-width="1.0" opacity="0.65"/>
  <line x1="760" y1="210" x2="475" y2="247" stroke="#D4A574" stroke-width="1.0" opacity="0.65"/>
  <!-- Interior centerline ray — axis of precision -->
  <line x1="760" y1="210" x2="475" y2="210" stroke="#D4A574" stroke-width="0.4" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Angle annotation bracket — indicates tight spread -->
  <path d="M 720,196 A 15,15 0 0,0 720,224" fill="none" stroke="#b8873a" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
  <text x="728" y="213" font-family="'Arial Narrow', Arial, sans-serif" font-size="9"
        fill="#D4A574" text-anchor="start" letter-spacing="1" opacity="0.7">
    15°
  </text>

  <!-- ═══════════════════════════════════════════════
       EISENHOWER SILHOUETTE — crisp, illuminated
       at far left end of the specific beam (x~505)
  ════════════════════════════════════════════════ -->

  <!-- Halo behind silhouette — gold light spill -->
  <ellipse cx="505" cy="207" rx="30" ry="34" fill="#D4A574" opacity="0.08"/>

  <!-- Silhouette group — cream white, sharp geometric -->
  <g fill="#f8fafc" filter="url(#ike-glow)">
    <!-- Peaked cap brim — flat precision rectangle -->
    <rect x="484" y="168" width="42" height="5" rx="1"/>
    <!-- Cap body — trapezoid, narrowing to crown -->
    <polygon points="488,168  522,168  518,154  492,154"/>
    <!-- Cap crown peak — pointed apex -->
    <polygon points="492,154  518,154  505,147"/>
    <!-- Head — oval -->
    <ellipse cx="505" cy="184" rx="14" ry="15"/>
    <!-- Neck -->
    <rect x="499" y="198" width="12" height="5"/>
    <!-- Torso — broad shoulders, authoritative silhouette -->
    <polygon points="480,203  530,203  537,250  473,250"/>
    <!-- Left arm -->
    <polygon points="473,205  480,203  477,238  467,240"/>
    <!-- Right arm -->
    <polygon points="537,205  530,203  533,238  543,240"/>
    <!-- Five-star collar insignia — row of dots -->
    <circle cx="489" cy="210" r="1.8"/>
    <circle cx="494" cy="208" r="1.8"/>
    <circle cx="499" cy="207" r="1.8"/>
    <circle cx="504" cy="206" r="1.8"/>
    <circle cx="509" cy="207" r="1.8"/>
  </g>

  <!-- Rim light on silhouette — gold edge from beam source -->
  <g fill="none" stroke="#D4A574" stroke-width="0.6" opacity="0.55">
    <ellipse cx="505" cy="184" rx="14" ry="15"/>
    <polygon points="480,203  530,203  537,250  473,250"/>
    <!-- Cap rim glint -->
    <rect x="484" y="168" width="42" height="5" rx="1"/>
  </g>

  <!-- EISENHOWER label — right of silhouette, within beam -->
  <text x="557" y="185" font-family="'Arial Narrow', Arial, sans-serif" font-size="13"
        font-weight="bold" fill="#f8fafc" text-anchor="start" letter-spacing="3">
    EISENHOWER
  </text>
  <!-- Sub-label — file reference -->
  <text x="557" y="200" font-family="'Arial Narrow', Arial, sans-serif" font-size="9"
        fill="#D4A574" text-anchor="start" letter-spacing="2" opacity="0.65">
    eisenhower.md
  </text>

  <!-- ═══════════════════════════════════════════════
       BOTTOM CAPTION BAND
  ════════════════════════════════════════════════ -->
  <rect x="0" y="378" width="900" height="42" fill="#0a0f1e"/>

  <!-- Decorative rule above caption -->
  <line x1="20" y1="378" x2="880" y2="378" stroke="#D4A574" stroke-width="0.5" opacity="0.3"/>

  <text x="450" y="404" font-family="'Arial Narrow', Arial, sans-serif" font-size="11"
        fill="#94a3b8" text-anchor="middle" letter-spacing="1.5" opacity="0.9">
    Specificity makes the selection more accurate. You are tuning the beam, not filling the room with light.
  </text>

  <!-- ═══════════════════════════════════════════════
       SIDE DECORATIVE BRACKETS — architectural framing
  ════════════════════════════════════════════════ -->

  <!-- Left bracket -->
  <polyline points="28,70  18,70  18,368  28,368"
    fill="none" stroke="#D4A574" stroke-width="1.0" opacity="0.3"/>

  <!-- Right bracket -->
  <polyline points="872,70  882,70  882,368  872,368"
    fill="none" stroke="#D4A574" stroke-width="1.0" opacity="0.3"/>

  <!-- ═══════════════════════════════════════════════
       PANEL LABELS — centered beneath each diagram
  ════════════════════════════════════════════════ -->

  <!-- Left panel footer label area -->
  <rect x="55" y="330" width="170" height="30" rx="1" fill="#0d1420" stroke="#334155" stroke-width="0.8"/>
  <text x="140" y="348" font-family="'Arial Narrow', Arial, sans-serif" font-size="10"
        fill="#475569" text-anchor="middle" letter-spacing="3">
    DIFFUSE · GENERIC · WEAK
  </text>

  <!-- Right panel footer label area -->
  <rect x="675" y="330" width="170" height="30" rx="1" fill="#1a1000" stroke="#6b4a18" stroke-width="0.8"/>
  <text x="760" y="348" font-family="'Arial Narrow', Arial, sans-serif" font-size="10"
        fill="#D4A574" text-anchor="middle" letter-spacing="3">
    FOCUSED · PRECISE · SHARP
  </text>

  <!-- ═══════════════════════════════════════════════
       CENTER DIVIDER ORNAMENT
  ════════════════════════════════════════════════ -->
  <polygon points="450,56   455,61  450,66  445,61" fill="#1e293b"/>
  <polygon points="450,195  455,200 450,205 445,200" fill="#1e293b"/>
  <polygon points="450,375  455,370 450,365 445,370" fill="#1e293b"/>

</svg>
