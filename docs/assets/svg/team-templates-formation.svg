      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0c0e0" text-anchor="middle">R</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#4060a0" text-anchor="middle">RSRCH×2</text>
    </g>
    <g transform="translate(124,110)">
      <circle cx="0" cy="0" r="12" fill="#1a2a3a" stroke="#4060a0" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0c0e0" text-anchor="middle">R</text>
    </g>

    <!-- Observer sanity check -->
    <line x1="82" y1="120" x2="82" y2="148" stroke="#3a5030" stroke-width="1" stroke-dasharray="2,3"/>
    <g transform="translate(82,155)">
      <circle cx="0" cy="0" r="12" fill="#1a1a3a" stroke="#5050a0" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0a0e0" text-anchor="middle">O</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#5050a0" text-anchor="middle">OBS</text>
