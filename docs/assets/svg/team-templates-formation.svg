<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" width="900" height="440">
  <title>Five Team Templates — Formation Diagram in Military Tactical Style</title>
  <desc>Top-down tactical formation map showing the five built-in team templates as military unit compositions. Each agent represented by a figure carrying a different tool icon. Steel blue, operational grey palette.</desc>

  <!-- Background — tactical map green/grey -->
  <rect width="900" height="440" fill="#1e2820"/>
  <rect x="0" y="0" width="900" height="440" fill="none" stroke="#3a5030" stroke-width="3"/>

  <!-- Subtle terrain texture lines -->
  <g stroke="#2a3828" stroke-width="0.5" opacity="0.4">
    <path d="M 0,50 Q 150,30 300,55 Q 450,80 600,50 Q 750,20 900,45"/>
    <path d="M 0,150 Q 200,130 400,155 Q 600,180 800,145 Q 850,138 900,142"/>
    <path d="M 0,280 Q 180,260 360,285 Q 540,310 720,275 Q 810,258 900,268"/>
  </g>

  <!-- Header bar -->
  <rect x="0" y="0" width="900" height="34" fill="#2a3828"/>
  <text x="450" y="23" font-family="serif" font-size="14" font-weight="bold" fill="#a0c080" text-anchor="middle" letter-spacing="4">TEAM TEMPLATES — TACTICAL FORMATION REFERENCE</text>

  <!-- ============ TEMPLATE 1: Standard Development ============ -->
  <g transform="translate(18,45)">
    <rect x="0" y="0" width="165" height="180" fill="#0d1a10" stroke="#3a5030" stroke-width="1.5" rx="3"/>
    <rect x="0" y="0" width="165" height="22" fill="#2a4020"/>
    <text x="82" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#a0c080" text-anchor="middle" letter-spacing="1">STD DEVELOPMENT</text>

    <!-- Coordinator at top (hub) -->
    <!-- Agent figure: circle with role letter -->
    <g transform="translate(82,50)">
      <circle cx="0" cy="0" r="14" fill="#1a3a6e" stroke="#6090c0" stroke-width="1.5"/>
      <text x="0" y="5" font-family="sans-serif" font-size="9" font-weight="bold" fill="#e0f0ff" text-anchor="middle">C</text>
      <!-- Baton icon above -->
      <rect x="-1" y="-22" width="2" height="8" fill="#6090c0"/>
      <text x="0" y="-28" font-family="sans-serif" font-size="6" fill="#6090c0" text-anchor="middle">COORD</text>
    </g>

    <!-- Connection lines from coordinator -->
    <line x1="72" y1="63" x2="36" y2="95" stroke="#3a5030" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="82" y1="64" x2="82" y2="95" stroke="#3a5030" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="92" y1="63" x2="128" y2="95" stroke="#3a5030" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- Implementer 1 -->
    <g transform="translate(36,110)">
      <circle cx="0" cy="0" r="12" fill="#5a1a00" stroke="#c06030" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#ffe0c0" text-anchor="middle">I</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#c06030" text-anchor="middle">IMPL×2</text>
    </g>

    <!-- Implementer 2 -->
    <g transform="translate(82,110)">
      <circle cx="0" cy="0" r="12" fill="#5a1a00" stroke="#c06030" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#ffe0c0" text-anchor="middle">I</text>
    </g>

    <!-- QA Validator -->
    <g transform="translate(128,110)">
      <circle cx="0" cy="0" r="12" fill="#1a3a1a" stroke="#30a050" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0e0a0" text-anchor="middle">Q</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#30a050" text-anchor="middle">QA</text>
    </g>

    <!-- Observer (bottom) -->
    <line x1="82" y1="120" x2="82" y2="148" stroke="#3a5030" stroke-width="1" stroke-dasharray="2,3"/>
    <g transform="translate(82,155)">
      <circle cx="0" cy="0" r="12" fill="#1a1a3a" stroke="#5050a0" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0a0e0" text-anchor="middle">O</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#5050a0" text-anchor="middle">OBS</text>
    </g>
  </g>

  <!-- ============ TEMPLATE 2: Quality Sprint ============ -->
  <g transform="translate(196,45)">
    <rect x="0" y="0" width="165" height="180" fill="#0d1a10" stroke="#3a5030" stroke-width="1.5" rx="3"/>
    <rect x="0" y="0" width="165" height="22" fill="#2a4020"/>
    <text x="82" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#a0c080" text-anchor="middle" letter-spacing="1">QUALITY SPRINT</text>

    <!-- Coordinator -->
    <g transform="translate(82,50)">
      <circle cx="0" cy="0" r="14" fill="#1a3a6e" stroke="#6090c0" stroke-width="1.5"/>
      <text x="0" y="5" font-family="sans-serif" font-size="9" font-weight="bold" fill="#e0f0ff" text-anchor="middle">C</text>
    </g>

    <line x1="68" y1="63" x2="40" y2="95" stroke="#3a5030" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="96" y1="63" x2="124" y2="95" stroke="#3a5030" stroke-width="1" stroke-dasharray="3,2"/>

    <!-- QA Validator ×2 -->
    <g transform="translate(40,110)">
      <circle cx="0" cy="0" r="12" fill="#1a3a1a" stroke="#30a050" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0e0a0" text-anchor="middle">Q</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#30a050" text-anchor="middle">QA×2</text>
    </g>
    <g transform="translate(124,110)">
      <circle cx="0" cy="0" r="12" fill="#1a3a1a" stroke="#30a050" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0e0a0" text-anchor="middle">Q</text>
