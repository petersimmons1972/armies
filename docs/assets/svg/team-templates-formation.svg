  <!-- Observer rule callout -->
  <rect x="40" y="340" width="820" height="50" fill="#0a1208" stroke="#2a5030" stroke-width="1" rx="3"/>
  <text x="60" y="358" font-family="serif" font-size="10" font-weight="bold" fill="#a0c080">Observer Rule:</text>
  <text x="60" y="372" font-family="serif" font-size="10" fill="#6a8060">Every built-in template includes an observer. This is not an accident. The observer receives NOTHING from other agents — only the raw artifact</text>
  <text x="60" y="385" font-family="serif" font-size="10" fill="#6a8060">and the original spec. An observation contaminated with prior findings provides no independent signal. It masquerades as verification while providing none.</text>

  <!-- Bottom rule -->
  <rect x="0" y="424" width="900" height="16" fill="#1e2820"/>
  <rect x="0" y="424" width="900" height="1" fill="#3a5030"/>
  <text x="450" y="436" font-family="sans-serif" font-size="8" fill="#3a5030" text-anchor="middle" letter-spacing="3">PICK THE WRONG TEMPLATE AND THE TEAM IS CONFIGURED FOR A DIFFERENT KIND OF WORK THAN YOU ARE DOING</text>

</svg>
