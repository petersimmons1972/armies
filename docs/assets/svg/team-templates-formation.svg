    <text x="82" y="45" font-family="sans-serif" font-size="6" fill="#ff6030" text-anchor="middle">PARALLEL</text>

    <!-- Convergence arrows down to implementer -->
    <line x1="55" y1="72" x2="70" y2="110" stroke="#8b2000" stroke-width="1.5"/>
    <line x1="110" y1="72" x2="95" y2="110" stroke="#8b2000" stroke-width="1.5"/>

    <!-- Implementer standby -->
    <g transform="translate(82,122)">
      <circle cx="0" cy="0" r="12" fill="#3a1500" stroke="#c05010" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#e0a080" text-anchor="middle">I</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#c05010" text-anchor="middle">STANDBY</text>
    </g>

    <!-- Observer docs -->
    <g transform="translate(82,155)">
      <circle cx="0" cy="0" r="12" fill="#1a1a3a" stroke="#5050a0" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0a0e0" text-anchor="middle">O</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#5050a0" text-anchor="middle">TIMELINE</text>
    </g>
  </g>

  <!-- ============ TEMPLATE 5: Planning Session ============ -->
  <g transform="translate(730,45)">
    <rect x="0" y="0" width="155" height="180" fill="#0d1a10" stroke="#3a5030" stroke-width="1.5" rx="3"/>
    <rect x="0" y="0" width="155" height="22" fill="#2a4020"/>
    <text x="77" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#a0c080" text-anchor="middle" letter-spacing="1">PLANNING</text>

    <!-- Coordinator at top -->
