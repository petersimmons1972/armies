    <circle cx="10" cy="10" r="12" fill="#1a3a6e" stroke="#6090c0" stroke-width="1.5"/>
    <text x="10" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#e0f0ff" text-anchor="middle">C</text>
