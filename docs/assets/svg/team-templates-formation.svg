<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" width="780" height="460">
  <title>Team Templates — Assemble Your Formation</title>
  <defs>
    <radialGradient id="tf-glow" cx="50%" cy="55%" r="50%">
      <stop offset="0%" stop-color="#c8a050" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c8a050" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tf-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="100%" stop-color="#050400"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="780" height="460" fill="url(#tf-ground)"/>
  <rect width="780" height="460" fill="none" stroke="#c8a050" stroke-width="3"/>
  <rect x="6" y="6" width="768" height="448" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.25"/>

  <!-- Top band -->
  <rect x="0" y="0" width="780" height="44" fill="#3a1a00"/>
  <text x="390" y="29" font-family="serif" font-size="26" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="6">ASSEMBLE YOUR FORMATION</text>

  <!-- Bottom band -->
  <rect x="0" y="416" width="780" height="44" fill="#3a1a00"/>
  <text x="390" y="440" font-family="serif" font-size="13" fill="#c8a050" text-anchor="middle" letter-spacing="5" opacity="0.8">COORDINATOR · IMPLEMENTER · VALIDATOR · OBSERVER</text>

  <!-- Ground glow -->
  <ellipse cx="390" cy="280" rx="340" ry="120" fill="url(#tf-glow)"/>

  <!-- Parade ground surface lines -->
  <g stroke="#1a1200" stroke-width="1" opacity="0.5">
    <line x1="40" y1="190" x2="740" y2="190"/>
    <line x1="40" y1="260" x2="740" y2="260"/>
    <line x1="40" y1="330" x2="740" y2="330"/>
    <line x1="40" y1="400" x2="740" y2="400"/>
  </g>

  <!-- Soldiers — front row, 6 figures -->
  <g fill="#c8a050" opacity="0.9">
    <g transform="translate(110,185)"><circle cx="0" cy="0" r="10"/><rect x="-8" y="12" width="16" height="32" rx="3"/><rect x="-12" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="4" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="-6" y="44" width="8" height="22" rx="2"/><rect x="2" y="44" width="8" height="22" rx="2"/></g>
    <g transform="translate(220,185)"><circle cx="0" cy="0" r="10"/><rect x="-8" y="12" width="16" height="32" rx="3"/><rect x="-12" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="4" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="-6" y="44" width="8" height="22" rx="2"/><rect x="2" y="44" width="8" height="22" rx="2"/></g>
    <g transform="translate(330,185)"><circle cx="0" cy="0" r="10"/><rect x="-8" y="12" width="16" height="32" rx="3"/><rect x="-12" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="4" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="-6" y="44" width="8" height="22" rx="2"/><rect x="2" y="44" width="8" height="22" rx="2"/></g>
    <g transform="translate(450,185)"><circle cx="0" cy="0" r="10"/><rect x="-8" y="12" width="16" height="32" rx="3"/><rect x="-12" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="4" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="-6" y="44" width="8" height="22" rx="2"/><rect x="2" y="44" width="8" height="22" rx="2"/></g>
    <g transform="translate(560,185)"><circle cx="0" cy="0" r="10"/><rect x="-8" y="12" width="16" height="32" rx="3"/><rect x="-12" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="4" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="-6" y="44" width="8" height="22" rx="2"/><rect x="2" y="44" width="8" height="22" rx="2"/></g>
    <g transform="translate(670,185)"><circle cx="0" cy="0" r="10"/><rect x="-8" y="12" width="16" height="32" rx="3"/><rect x="-12" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="4" y="10" width="8" height="6" rx="2" fill="#8b6010"/><rect x="-6" y="44" width="8" height="22" rx="2"/><rect x="2" y="44" width="8" height="22" rx="2"/></g>

    <!-- Middle row, 5 soldiers, offset -->
    <g transform="translate(165,265)" opacity="0.75"><circle cx="0" cy="0" r="9"/><rect x="-7" y="11" width="14" height="28" rx="3"/><rect x="-5" y="39" width="6" height="18" rx="2"/><rect x="3" y="39" width="6" height="18" rx="2"/></g>
    <g transform="translate(275,265)" opacity="0.75"><circle cx="0" cy="0" r="9"/><rect x="-7" y="11" width="14" height="28" rx="3"/><rect x="-5" y="39" width="6" height="18" rx="2"/><rect x="3" y="39" width="6" height="18" rx="2"/></g>
    <g transform="translate(390,265)" opacity="0.75"><circle cx="0" cy="0" r="9"/><rect x="-7" y="11" width="14" height="28" rx="3"/><rect x="-5" y="39" width="6" height="18" rx="2"/><rect x="3" y="39" width="6" height="18" rx="2"/></g>
    <g transform="translate(505,265)" opacity="0.75"><circle cx="0" cy="0" r="9"/><rect x="-7" y="11" width="14" height="28" rx="3"/><rect x="-5" y="39" width="6" height="18" rx="2"/><rect x="3" y="39" width="6" height="18" rx="2"/></g>
    <g transform="translate(615,265)" opacity="0.75"><circle cx="0" cy="0" r="9"/><rect x="-7" y="11" width="14" height="28" rx="3"/><rect x="-5" y="39" width="6" height="18" rx="2"/><rect x="3" y="39" width="6" height="18" rx="2"/></g>

    <!-- Back row, 4 soldiers, smaller/dimmer -->
    <g transform="translate(220,340)" opacity="0.5"><circle cx="0" cy="0" r="8"/><rect x="-6" y="10" width="12" height="24" rx="2"/><rect x="-4" y="34" width="5" height="16" rx="2"/><rect x="3" y="34" width="5" height="16" rx="2"/></g>
    <g transform="translate(340,340)" opacity="0.5"><circle cx="0" cy="0" r="8"/><rect x="-6" y="10" width="12" height="24" rx="2"/><rect x="-4" y="34" width="5" height="16" rx="2"/><rect x="3" y="34" width="5" height="16" rx="2"/></g>
    <g transform="translate(450,340)" opacity="0.5"><circle cx="0" cy="0" r="8"/><rect x="-6" y="10" width="12" height="24" rx="2"/><rect x="-4" y="34" width="5" height="16" rx="2"/><rect x="3" y="34" width="5" height="16" rx="2"/></g>
    <g transform="translate(560,340)" opacity="0.5"><circle cx="0" cy="0" r="8"/><rect x="-6" y="10" width="12" height="24" rx="2"/><rect x="-4" y="34" width="5" height="16" rx="2"/><rect x="3" y="34" width="5" height="16" rx="2"/></g>

    <!-- Commanding officer — center front, taller -->
    <g transform="translate(390,140)" fill="#c8a050">
      <ellipse cx="0" cy="0" rx="13" ry="14"/>
      <ellipse cx="0" cy="-11" rx="16" ry="6" fill="#8b6010"/>
      <rect x="-16" y="-13" width="32" height="6" rx="2" fill="#8b6010"/>
      <path d="M -18,14 L -22,64 L 22,64 L 18,14 Z"/>
      <rect x="-26" y="14" width="10" height="8" rx="2" fill="#8b6010"/>
      <rect x="16" y="14" width="10" height="8" rx="2" fill="#8b6010"/>
      <line x1="22" y1="30" x2="55" y2="50" stroke="#c8a050" stroke-width="3" stroke-linecap="round"/>
      <rect x="-12" y="64" width="10" height="36" rx="3"/>
      <rect x="2" y="64" width="10" height="36" rx="3"/>
    </g>
  </g>

  <!-- Formation label lines (subtle) -->
  <line x1="60" y1="183" x2="60" y2="272" stroke="#c8a050" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
  <line x1="720" y1="183" x2="720" y2="272" stroke="#c8a050" stroke-width="0.5" opacity="0.2" stroke-dasharray="3,3"/>
  <text x="44" y="236" font-family="monospace" font-size="11" fill="#c8a050" text-anchor="middle" opacity="0.4" transform="rotate(-90,44,236)">RANK 1</text>
  <text x="44" y="306" font-family="monospace" font-size="11" fill="#c8a050" text-anchor="middle" opacity="0.3" transform="rotate(-90,44,306)">RANK 2</text>

</svg>
