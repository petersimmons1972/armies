      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#e0c0ff" text-anchor="middle">P</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#8060a0" text-anchor="middle">PLAN×2</text>
    </g>
    <g transform="translate(119,110)">
      <circle cx="0" cy="0" r="12" fill="#3a1a5a" stroke="#8060a0" stroke-width="1.5"/>
      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#e0c0ff" text-anchor="middle">P</text>
