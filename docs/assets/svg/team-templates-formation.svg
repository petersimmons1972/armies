  <rect x="0" y="238" width="900" height="2" fill="#3a5030"/>
  <text x="450" y="258" font-family="serif" font-size="11" font-weight="bold" fill="#a0c080" text-anchor="middle" letter-spacing="3">ROLE LEGEND</text>

  <!-- Legend entries in a row -->
