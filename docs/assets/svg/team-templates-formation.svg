      <text x="0" y="-22" font-family="sans-serif" font-size="6" fill="#ff6030" text-anchor="middle">TROUBLESH.</text>
      <text x="0" y="22" font-family="sans-serif" font-size="6" fill="#ff8050" text-anchor="middle">OPUS</text>
    </g>
    <g transform="translate(120,55)">
      <circle cx="0" cy="0" r="16" fill="#6a2000" stroke="#ff6030" stroke-width="2"/>
      <text x="0" y="5" font-family="sans-serif" font-size="10" font-weight="bold" fill="#ffb060" text-anchor="middle">T</text>
      <text x="0" y="22" font-family="sans-serif" font-size="6" fill="#ff8050" text-anchor="middle">OPUS</text>
