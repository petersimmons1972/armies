      <text x="0" y="4" font-family="sans-serif" font-size="8" fill="#a0c0e0" text-anchor="middle">R</text>
      <text x="0" y="18" font-family="sans-serif" font-size="6" fill="#4060a0" text-anchor="middle">SUPPORT</text>
