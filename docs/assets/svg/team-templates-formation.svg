    <text x="10" y="42" font-family="sans-serif" font-size="7" fill="#3a5030" text-anchor="middle">sonnet</text>
  </g>

  <g transform="translate(240, 275)">
    <circle cx="10" cy="10" r="12" fill="#1a3a1a" stroke="#30a050" stroke-width="1.5"/>
    <text x="10" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#a0e0a0" text-anchor="middle">Q</text>
    <text x="10" y="32" font-family="sans-serif" font-size="8" fill="#30a050" text-anchor="middle">QA-VALIDATOR</text>
    <text x="10" y="42" font-family="sans-serif" font-size="7" fill="#3a5030" text-anchor="middle">sonnet</text>
  </g>

  <g transform="translate(340, 275)">
    <circle cx="10" cy="10" r="12" fill="#6a2000" stroke="#ff6030" stroke-width="2"/>
    <text x="10" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#ffb060" text-anchor="middle">T</text>
    <text x="10" y="32" font-family="sans-serif" font-size="8" fill="#ff6030" text-anchor="middle">TROUBLESHOOTER</text>
    <text x="10" y="42" font-family="sans-serif" font-size="7" fill="#3a5030" text-anchor="middle">opus (emergency)</text>
  </g>

  <g transform="translate(460, 275)">
    <circle cx="10" cy="10" r="12" fill="#3a1a5a" stroke="#8060a0" stroke-width="1.5"/>
    <text x="10" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#e0c0ff" text-anchor="middle">P</text>
    <text x="10" y="32" font-family="sans-serif" font-size="8" fill="#8060a0" text-anchor="middle">PLANNER</text>
    <text x="10" y="42" font-family="sans-serif" font-size="7" fill="#3a5030" text-anchor="middle">opus</text>
  </g>

  <g transform="translate(560, 275)">
    <circle cx="10" cy="10" r="12" fill="#1a2a3a" stroke="#4060a0" stroke-width="1.5"/>
    <text x="10" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#a0c0e0" text-anchor="middle">R</text>
    <text x="10" y="32" font-family="sans-serif" font-size="8" fill="#4060a0" text-anchor="middle">RESEARCHER</text>
    <text x="10" y="42" font-family="sans-serif" font-size="7" fill="#3a5030" text-anchor="middle">sonnet</text>
  </g>

  <g transform="translate(660, 275)">
    <circle cx="10" cy="10" r="12" fill="#1a1a3a" stroke="#5050a0" stroke-width="1.5"/>
    <text x="10" y="15" font-family="sans-serif" font-size="9" font-weight="bold" fill="#a0a0e0" text-anchor="middle">O</text>
    <text x="10" y="32" font-family="sans-serif" font-size="8" fill="#5050a0" text-anchor="middle">OBSERVER</text>
    <text x="10" y="42" font-family="sans-serif" font-size="7" fill="#3a5030" text-anchor="middle">zero-context</text>
