  <!-- ============ TEMPLATE 4: Emergency Firefighting ============ -->
  <g transform="translate(552,45)">
    <rect x="0" y="0" width="165" height="180" fill="#1a0800" stroke="#8b2000" stroke-width="2" rx="3"/>
