<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <title>Decorative Section Divider — Gold Stars and Rule Line</title>
  <desc>WWII poster-style decorative horizontal divider with gold stars and ornamental rule. Multi-purpose use across all documentation pages.</desc>
  <rect width="800" height="40" fill="transparent"/>
  <!-- Main rule lines -->
  <line x1="0" y1="20" x2="800" y2="20" stroke="#c8a050" stroke-width="1.5" opacity="0.7"/>
  <line x1="0" y1="17" x2="800" y2="17" stroke="#c8a050" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="23" x2="800" y2="23" stroke="#c8a050" stroke-width="0.5" opacity="0.3"/>
  <!-- Center ornament -->
  <text x="400" y="26" font-family="serif" font-size="16" fill="#c8a050" text-anchor="middle">✦</text>
  <!-- Flanking stars -->
  <text x="340" y="24" font-family="serif" font-size="11" fill="#c8a050" text-anchor="middle" opacity="0.8">★</text>
  <text x="460" y="24" font-family="serif" font-size="11" fill="#c8a050" text-anchor="middle" opacity="0.8">★</text>
  <!-- Outer ornaments -->
  <text x="200" y="23" font-family="serif" font-size="8" fill="#c8a050" text-anchor="middle" opacity="0.5">◆</text>
  <text x="600" y="23" font-family="serif" font-size="8" fill="#c8a050" text-anchor="middle" opacity="0.5">◆</text>
  <!-- Rule gap around center -->
  <rect x="305" y="15" width="190" height="10" fill="transparent"/>
</svg>
