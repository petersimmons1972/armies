<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <title>The Accountability Ledger — Two Independent Ledgers, The Two Founding Precedents</title>
  <desc>War tribunal / official record style illustration showing the dual XP and Malus ledgers as two heavy books, with the two founding precedents inscribed on stone tablets. Dark red, burgundy, black palette. A pocket watch Easter egg shows Eisenhower's malus carries no time decay — permanent forever.</desc>

  <!-- Background — courthouse/tribunal black -->
  <rect width="800" height="500" fill="#0a0404"/>
  <rect x="0" y="0" width="800" height="500" fill="none" stroke="#4a0a0a" stroke-width="4"/>
  <rect x="4" y="4" width="792" height="492" fill="none" stroke="#4a0a0a" stroke-width="1" opacity="0.4"/>

  <!-- Title banner at top -->
  <rect x="0" y="0" width="800" height="40" fill="#2a0808"/>
  <rect x="0" y="40" width="800" height="2" fill="#8b0000"/>
  <text x="400" y="27" font-family="serif" font-size="25.6" font-weight="bold" fill="#d0a0a0" text-anchor="middle" letter-spacing="5">THE ACCOUNTABILITY SYSTEM</text>

  <!-- LEFT: XP Ledger — heavy book -->
  <g transform="translate(60, 60)">
    <!-- Book shadow -->
    <rect x="5" y="5" width="280" height="360" rx="3" fill="#050202" opacity="0.7"/>
    <!-- Book body -->
    <rect x="0" y="0" width="280" height="360" rx="3" fill="#1a1a0a" stroke="#5a5a10" stroke-width="2"/>
    <!-- Book spine -->
    <rect x="0" y="0" width="22" height="360" fill="#2a2a10" rx="2"/>
    <!-- Spine lines -->
    <line x1="11" y1="20" x2="11" y2="340" stroke="#5a5a10" stroke-width="0.5" stroke-dasharray="2,4"/>
    <!-- Book title on cover -->
    <rect x="30" y="20" width="230" height="50" fill="#0d0d05" stroke="#5a5a10" stroke-width="1" rx="2"/>
    <text x="145" y="42" font-family="serif" font-size="22.4" font-weight="bold" fill="#c8b840" text-anchor="middle" letter-spacing="3">XP LEDGER</text>
    <text x="145" y="58" font-family="serif" font-size="18" fill="#8a8030" text-anchor="middle" letter-spacing="2">EXPERIENCE RECORD</text>

    <!-- XP entries table mockup -->
    <rect x="30" y="82" width="230" height="250" fill="#0a0a02" stroke="#3a3a08" stroke-width="0.5" rx="1"/>
    <!-- Column headers -->
    <rect x="30" y="82" width="230" height="18" fill="#1a1a05"/>
    <text x="60" y="94" font-family="monospace" font-size="17.5" fill="#8a8030">AGENT</text>
    <text x="140" y="94" font-family="monospace" font-size="17.5" fill="#8a8030">TASK TYPE</text>
    <text x="220" y="94" font-family="monospace" font-size="17.5" fill="#8a8030">XP</text>

    <!-- Entries -->
    <g font-family="monospace" font-size="17.5">
      <line x1="30" y1="104" x2="260" y2="104" stroke="#2a2a05" stroke-width="0.5"/>
      <text x="36" y="113" fill="#a0a060">grace-hopper</text>
      <text x="140" y="113" fill="#7a7a40">troubleshoot</text>
      <text x="225" y="113" fill="#c8b840">+200</text>

      <line x1="30" y1="118" x2="260" y2="118" stroke="#2a2a05" stroke-width="0.5"/>
      <text x="36" y="127" fill="#a0a060">grace-hopper</text>
      <text x="140" y="127" fill="#7a7a40">implement</text>
      <text x="225" y="127" fill="#c8b840">+100</text>

      <line x1="30" y1="132" x2="260" y2="132" stroke="#2a2a05" stroke-width="0.5"/>
      <text x="36" y="141" fill="#a0a060">eisenhower</text>
      <text x="140" y="141" fill="#7a7a40">coordinate</text>
      <text x="225" y="141" fill="#c8b840">+150</text>

      <line x1="30" y1="146" x2="260" y2="146" stroke="#2a2a05" stroke-width="0.5"/>
      <text x="36" y="155" fill="#a0a060">spruance</text>
      <text x="140" y="155" fill="#7a7a40">qa-validate</text>
      <text x="225" y="155" fill="#c8b840">+75</text>

      <line x1="30" y1="160" x2="260" y2="160" stroke="#2a2a05" stroke-width="0.5"/>
      <text x="36" y="169" fill="#a0a060">jane-goodall</text>
      <text x="140" y="169" fill="#7a7a40">observe</text>
      <text x="225" y="169" fill="#c8b840">+50</text>
    </g>

    <!-- "XP only goes up" principle, stamped -->
    <g transform="translate(45,290)">
      <rect x="0" y="0" width="210" height="30" fill="none" stroke="#5a5a10" stroke-width="1.5" rx="2"/>
      <text x="105" y="12" font-family="serif" font-size="18" fill="#c8b840" text-anchor="middle">XP ONLY GOES UP</text>
      <text x="105" y="24" font-family="monospace" font-size="17.5" fill="#8a8030" text-anchor="middle">Past contributions are never erased.</text>
    </g>

    <!-- Total at bottom of book -->
    <rect x="30" y="330" width="230" height="22" fill="#1a1a05" stroke="#5a5a10" stroke-width="0.5"/>
    <text x="145" y="344" font-family="monospace" font-size="20" fill="#c8b840" text-anchor="middle">Eisenhower total XP: 550 ✓ (permanent)</text>
  </g>

  <!-- RIGHT: Malus Ledger — heavy book, dark red -->
  <g transform="translate(460, 60)">
    <!-- Book shadow -->
    <rect x="5" y="5" width="280" height="360" rx="3" fill="#050102" opacity="0.7"/>
    <!-- Book body -->
    <rect x="0" y="0" width="280" height="360" rx="3" fill="#1a0404" stroke="#5a0a0a" stroke-width="2"/>
    <!-- Book spine -->
    <rect x="0" y="0" width="22" height="360" fill="#2a0808" rx="2"/>
    <line x1="11" y1="20" x2="11" y2="340" stroke="#5a0a0a" stroke-width="0.5" stroke-dasharray="2,4"/>
    <!-- Book title on cover -->
    <rect x="30" y="20" width="230" height="50" fill="#0d0202" stroke="#5a0a0a" stroke-width="1" rx="2"/>
    <text x="145" y="42" font-family="serif" font-size="22.4" font-weight="bold" fill="#c84040" text-anchor="middle" letter-spacing="3">MALUS LEDGER</text>
    <text x="145" y="58" font-family="serif" font-size="18" fill="#8a2020" text-anchor="middle" letter-spacing="2">ACCOUNTABILITY RECORD</text>

    <!-- Malus entries table mockup -->
    <rect x="30" y="82" width="230" height="250" fill="#0a0202" stroke="#3a0808" stroke-width="0.5" rx="1"/>
    <rect x="30" y="82" width="230" height="18" fill="#1a0505"/>
    <text x="36" y="94" font-family="monospace" font-size="17.5" fill="#8a2020">ID</text>
    <text x="60" y="94" font-family="monospace" font-size="17.5" fill="#8a2020">AGENT</text>
    <text x="130" y="94" font-family="monospace" font-size="17.5" fill="#8a2020">POINTS</text>
    <text x="185" y="94" font-family="monospace" font-size="17.5" fill="#8a2020">DECAYS</text>

    <!-- Malus entries -->
    <g font-family="monospace" font-size="17.5">
      <line x1="30" y1="104" x2="260" y2="104" stroke="#2a0505" stroke-width="0.5"/>
      <text x="33" y="113" fill="#c84040">MAL-001</text>
      <text x="88" y="113" fill="#a06060">eisenhower</text>
      <text x="133" y="113" fill="#c84040">100.0</text>
      <text x="188" y="113" fill="#8b0000">NEVER</text>

      <line x1="30" y1="118" x2="260" y2="118" stroke="#2a0505" stroke-width="0.5"/>
      <text x="33" y="127" fill="#c84040">MAL-002</text>
      <text x="88" y="127" fill="#a06060">eisenhower</text>
      <text x="133" y="127" fill="#c84040">60.0</text>
      <text x="188" y="127" fill="#8b0000">NEVER</text>

      <!-- Some decaying entries -->
      <line x1="30" y1="132" x2="260" y2="132" stroke="#2a0505" stroke-width="0.5"/>
      <text x="33" y="141" fill="#c06060">MAL-003</text>
      <text x="88" y="141" fill="#a06060">some-agent</text>
      <text x="133" y="141" fill="#c06060">12.5↓</text>
      <text x="188" y="141" fill="#6a4040">28 days</text>

      <line x1="30" y1="146" x2="260" y2="146" stroke="#2a0505" stroke-width="0.5"/>
      <text x="33" y="155" fill="#804040">MAL-004</text>
      <text x="88" y="155" fill="#805050">some-agent</text>
      <text x="133" y="155" fill="#804040">6.25↓</text>
      <text x="188" y="155" fill="#6a4040">56 days</text>
    </g>

    <!-- Total current malus for Eisenhower -->
    <rect x="30" y="240" width="230" height="40" fill="#1a0505" stroke="#5a0a0a" stroke-width="0.5" rx="2"/>
    <text x="145" y="257" font-family="monospace" font-size="20" fill="#c84040" text-anchor="middle">Eisenhower effective malus: 160.0</text>
    <text x="145" y="270" font-family="monospace" font-size="17.5" fill="#8b0000" text-anchor="middle">decays: false — permanent forever</text>

    <!-- Pocket watch Easter egg — "time has not erased it" -->
    <g transform="translate(200, 295)" opacity="0.55">
      <circle cx="0" cy="0" r="14" fill="none" stroke="#5a0a0a" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="12" fill="#0a0202" stroke="#4a0808" stroke-width="0.5"/>
      <!-- Clock face marks -->
      <line x1="0" y1="-10" x2="0" y2="-8" stroke="#5a0a0a" stroke-width="1"/>
      <line x1="10" y1="0" x2="8" y2="0" stroke="#5a0a0a" stroke-width="1"/>
      <line x1="0" y1="10" x2="0" y2="8" stroke="#5a0a0a" stroke-width="1"/>
      <line x1="-10" y1="0" x2="-8" y2="0" stroke="#5a0a0a" stroke-width="1"/>
      <!-- Clock hands — stopped at the time of the incident -->
      <line x1="0" y1="0" x2="0" y2="-8" stroke="#8b0000" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="7" y2="2" stroke="#8b0000" stroke-width="1" stroke-linecap="round"/>
      <!-- Crown stem -->
      <rect x="-1" y="-16" width="2" height="5" fill="#5a0a0a"/>
      <rect x="-3" y="-16" width="6" height="2" fill="#5a0a0a" rx="1"/>
    </g>
    <!-- Small "NO DECAY" inscription near the watch -->
    <text x="175" y="322" font-family="serif" font-size="13.8" fill="#5a0a0a" text-anchor="middle" font-style="italic">no decay</text>

    <!-- What never decays legend -->
    <rect x="30" y="330" width="230" height="22" fill="#1a0505" stroke="#5a0a0a" stroke-width="0.5"/>
    <text x="145" y="340" font-family="monospace" font-size="17.5" fill="#c84040" text-anchor="middle">root_cause: operational_malpractice</text>
    <text x="145" y="350" font-family="monospace" font-size="17.5" fill="#c84040" text-anchor="middle">strategic_malpractice | insubordination</text>
  </g>

  <!-- Center: Double-headed separator with "INDEPENDENT" label -->
  <line x1="400" y1="70" x2="400" y2="430" stroke="#2a1a00" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <rect x="358" y="250" width="84" height="22" fill="#0a0404" stroke="#2a1a00" stroke-width="1" rx="2"/>
  <text x="400" y="265" font-family="serif" font-size="18" fill="#4a3a00" text-anchor="middle">INDEPENDENT</text>

  <!-- Two founding precedents at the bottom — "stone tablet" style -->
  <rect x="20" y="438" width="360" height="52" fill="#0d0404" stroke="#4a0a0a" stroke-width="1.5" rx="3"/>
  <text x="200" y="455" font-family="serif" font-size="18" font-weight="bold" fill="#c84040" text-anchor="middle" letter-spacing="2">CISO PRECEDENT</text>
  <text x="200" y="468" font-family="serif" font-size="20" fill="#8a2020" text-anchor="middle">Strategic malpractice: recommending foundational</text>
  <text x="200" y="480" font-family="serif" font-size="20" fill="#8a2020" text-anchor="middle">security controls be deferred. Permanent. No decay.</text>

  <rect x="420" y="438" width="360" height="52" fill="#0d0404" stroke="#4a0a0a" stroke-width="1.5" rx="3"/>
  <text x="600" y="455" font-family="serif" font-size="18" font-weight="bold" fill="#c84040" text-anchor="middle" letter-spacing="2">EISENHOWER PRECEDENT</text>
  <text x="600" y="468" font-family="serif" font-size="20" fill="#8a2020" text-anchor="middle">Operational malpractice + insubordination: coordinator</text>
  <text x="600" y="480" font-family="serif" font-size="20" fill="#8a2020" text-anchor="middle">implementing instead of delegating. 160.0 — permanent.</text>

</svg>
