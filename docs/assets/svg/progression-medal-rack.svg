<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 440" width="740" height="440">
  <title>Progression — Service Rewarded</title>
  <defs>
    <radialGradient id="pm-glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#c8a050" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c8a050" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="740" height="440" fill="#0d0800"/>
  <rect width="740" height="440" fill="none" stroke="#c8a050" stroke-width="3"/>
  <rect x="6" y="6" width="728" height="428" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.25"/>

  <!-- Top band -->
  <rect x="0" y="0" width="740" height="44" fill="#3a1a00"/>
  <text x="370" y="29" font-family="serif" font-size="26" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="7">SERVICE REWARDED</text>

  <!-- Bottom band -->
  <rect x="0" y="396" width="740" height="44" fill="#3a1a00"/>
  <text x="370" y="420" font-family="serif" font-size="13" fill="#c8a050" text-anchor="middle" letter-spacing="5" opacity="0.8">XP ACCUMULATES — RANK ADVANCES — LEGEND AWAITS</text>

  <!-- Center glow -->
  <ellipse cx="370" cy="210" rx="270" ry="130" fill="url(#pm-glow)"/>

  <!-- Uniform panel background -->
  <rect x="130" y="60" width="480" height="320" fill="#1a1000" rx="4" stroke="#4a3000" stroke-width="1.5"/>

  <!-- Medal ribbon bar — row 1: 6 ribbons -->
  <g transform="translate(180, 90)">
    <!-- Ribbon 1 — Campaign Medal: red/gold -->
    <rect x="0" y="0" width="44" height="28" fill="#8b0000" rx="2"/>
    <rect x="0" y="0" width="44" height="10" fill="#c83030" rx="2"/>
    <rect x="18" y="0" width="8" height="28" fill="#c8a050" opacity="0.6"/>

    <!-- Ribbon 2 — Service Medal: olive/gold -->
    <rect x="52" y="0" width="44" height="28" fill="#3a4a10" rx="2"/>
    <rect x="52" y="0" width="44" height="10" fill="#5a6a20" rx="2"/>
    <rect x="70" y="0" width="8" height="28" fill="#c8a050" opacity="0.6"/>

    <!-- Ribbon 3 — Campaign Medal: blue/silver -->
    <rect x="104" y="0" width="44" height="28" fill="#1a2a4a" rx="2"/>
    <rect x="104" y="0" width="44" height="10" fill="#2a4a7a" rx="2"/>
    <rect x="122" y="0" width="8" height="28" fill="#c8d8f0" opacity="0.6"/>

    <!-- Ribbon 4 — Commendation: purple/gold -->
    <rect x="156" y="0" width="44" height="28" fill="#2a0a3a" rx="2"/>
    <rect x="156" y="0" width="44" height="10" fill="#4a1a6a" rx="2"/>
    <rect x="174" y="0" width="8" height="28" fill="#c8a050" opacity="0.6"/>

    <!-- Ribbon 5 — Merit Medal: green/gold -->
    <rect x="208" y="0" width="44" height="28" fill="#0a2a10" rx="2"/>
    <rect x="208" y="0" width="44" height="10" fill="#1a4a20" rx="2"/>
    <rect x="226" y="0" width="8" height="28" fill="#c8a050" opacity="0.6"/>

    <!-- Ribbon 6 — Distinguished: gold/red -->
    <rect x="260" y="0" width="44" height="28" fill="#3a2000" rx="2"/>
    <rect x="260" y="0" width="44" height="10" fill="#8b5000" rx="2"/>
    <rect x="278" y="0" width="8" height="28" fill="#c83030" opacity="0.8"/>
  </g>

  <!-- Row 2: hanging medals -->
  <g transform="translate(168, 148)">
    <!-- Medal 1: Commendation -->
    <rect x="0" y="0" width="48" height="8" fill="#c83030" rx="2"/>
    <line x1="24" y1="8" x2="24" y2="32" stroke="#c8a050" stroke-width="1.5"/>
    <circle cx="24" cy="44" r="14" fill="none" stroke="#c8a050" stroke-width="2"/>
    <circle cx="24" cy="44" r="8" fill="#3a1a00" stroke="#c8a050" stroke-width="1"/>
    <text x="24" y="48" font-family="serif" font-size="10" fill="#c8a050" text-anchor="middle">★</text>

    <!-- Medal 2: Citation -->
    <rect x="70" y="0" width="48" height="8" fill="#2a5010" rx="2"/>
    <line x1="94" y1="8" x2="94" y2="32" stroke="#c8a050" stroke-width="1.5"/>
    <circle cx="94" cy="44" r="14" fill="none" stroke="#5a9a30" stroke-width="2"/>
    <circle cx="94" cy="44" r="8" fill="#0a1a08" stroke="#5a9a30" stroke-width="1"/>
    <text x="94" y="48" font-family="serif" font-size="10" fill="#5a9a30" text-anchor="middle">★</text>

    <!-- Medal 3: Valor -->
    <rect x="140" y="0" width="48" height="8" fill="#1a2a4a" rx="2"/>
    <line x1="164" y1="8" x2="164" y2="32" stroke="#c8a050" stroke-width="1.5"/>
    <!-- Pentagon shape for valor -->
    <polygon points="164,30 178,40 173,56 155,56 150,40" fill="none" stroke="#4a7ab0" stroke-width="2"/>
    <circle cx="164" cy="44" r="6" fill="#060d1a" stroke="#4a7ab0" stroke-width="1"/>
    <text x="164" y="48" font-family="serif" font-size="8" fill="#4a7ab0" text-anchor="middle">★</text>

    <!-- Medal 4: Order of Victory — large, ornate -->
    <rect x="218" y="0" width="52" height="10" fill="#8b5000" rx="2"/>
    <rect x="218" y="0" width="52" height="10" fill="none" stroke="#c8a050" stroke-width="1"/>
    <line x1="244" y1="10" x2="244" y2="30" stroke="#c8a050" stroke-width="2"/>
    <!-- Star-shaped medal -->
    <polygon points="244,30 252,42 264,42 255,50 258,62 244,56 230,62 233,50 224,42 236,42" fill="#3a2000" stroke="#c8a050" stroke-width="1.5"/>
    <circle cx="244" cy="46" r="7" fill="#1a0800" stroke="#c8a050" stroke-width="1"/>
    <text x="244" y="50" font-family="serif" font-size="8" fill="#c8a050" text-anchor="middle">✦</text>

    <!-- Medal 5: Supreme Allied Commander — largest -->
    <rect x="292" y="-6" width="70" height="14" fill="#c8a050" rx="2"/>
    <rect x="292" y="-6" width="70" height="14" fill="none" stroke="#8b6010" stroke-width="1"/>
    <line x1="327" y1="8" x2="327" y2="26" stroke="#c8a050" stroke-width="2.5"/>
    <!-- Cross-shaped medal — enlarged -->
    <rect x="312" y="26" width="30" height="64" rx="4" fill="#1a0800" stroke="#c8a050" stroke-width="2"/>
    <rect x="297" y="42" width="60" height="30" rx="4" fill="#1a0800" stroke="#c8a050" stroke-width="2"/>
    <circle cx="327" cy="57" r="13" fill="#0d0800" stroke="#c8a050" stroke-width="2"/>
    <text x="327" y="62" font-family="serif" font-size="12" fill="#c8a050" text-anchor="middle">✦</text>
    <circle cx="327" cy="57" r="6" fill="#c8a050" opacity="0.4"/>
  </g>

  <!-- Uniform decorative elements -->
  <!-- Rank insignia block -->
  <g transform="translate(155, 310)">
    <rect x="0" y="0" width="430" height="64" fill="#1e1400" rx="3" stroke="#4a3000" stroke-width="1"/>
    <text x="215" y="22" font-family="serif" font-size="14" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="4">RANK PROGRESSION</text>
    <text x="215" y="42" font-family="monospace" font-size="10" fill="#8b6010" text-anchor="middle" letter-spacing="1">PRIVATE → COLONEL → FIELD MARSHAL</text>
    <text x="215" y="58" font-family="monospace" font-size="10" fill="#8b6010" text-anchor="middle" letter-spacing="1">→ SUPREME ALLIED COMMANDER</text>
  </g>

</svg>
