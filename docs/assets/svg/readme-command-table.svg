<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 460" width="780" height="460">
  <title>Armies — Command Reference</title>
  <defs>
    <linearGradient id="ct-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1200"/>
      <stop offset="100%" stop-color="#0d0800"/>
    </linearGradient>
    <linearGradient id="ct-row-even" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1600"/>
      <stop offset="100%" stop-color="#181000"/>
    </linearGradient>
    <linearGradient id="ct-row-odd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#150e00"/>
      <stop offset="100%" stop-color="#120c00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="780" height="460" fill="url(#ct-bg)"/>
  <rect width="780" height="460" fill="none" stroke="#c8a050" stroke-width="3"/>
  <rect x="6" y="6" width="768" height="448" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.3"/>

  <!-- Top band -->
  <rect x="0" y="0" width="780" height="52" fill="#3a1a00"/>
  <!-- Corner stars left -->
  <text x="22" y="34" font-family="serif" font-size="18" fill="#c8a050" text-anchor="middle" opacity="0.8">★</text>
  <text x="46" y="34" font-family="serif" font-size="18" fill="#c8a050" text-anchor="middle" opacity="0.6">★</text>
  <!-- Main title -->
  <text x="390" y="24" font-family="serif" font-size="30" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="10">ARMIES</text>
  <text x="390" y="44" font-family="serif" font-size="13" fill="#d8c880" text-anchor="middle" letter-spacing="7">COMMAND  REFERENCE</text>
  <!-- Corner stars right -->
  <text x="734" y="34" font-family="serif" font-size="18" fill="#c8a050" text-anchor="middle" opacity="0.6">★</text>
  <text x="758" y="34" font-family="serif" font-size="18" fill="#c8a050" text-anchor="middle" opacity="0.8">★</text>

  <!-- Decorative double rule under header -->
  <line x1="30" y1="58" x2="750" y2="58" stroke="#c8a050" stroke-width="1.5"/>
  <line x1="30" y1="61" x2="750" y2="61" stroke="#8b6914" stroke-width="0.5"/>

  <!-- Column header band -->
  <rect x="30" y="66" width="720" height="24" fill="#2a1a00"/>
  <text x="50" y="83" font-family="monospace" font-size="11" font-weight="bold" fill="#e8b860" letter-spacing="3">COMMAND</text>
  <text x="360" y="83" font-family="monospace" font-size="11" font-weight="bold" fill="#e8b860" letter-spacing="3">DESCRIPTION</text>
  <!-- Column divider line in header -->
  <line x1="340" y1="66" x2="340" y2="90" stroke="#8b6914" stroke-width="1"/>

  <!-- Outer table border -->
  <rect x="30" y="66" width="720" height="322" fill="none" stroke="#8b6914" stroke-width="1"/>

  <!-- ROW 1 — roster -->
  <rect x="30" y="90" width="720" height="34" fill="url(#ct-row-even)"/>
  <line x1="30" y1="124" x2="750" y2="124" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="90" x2="340" y2="124" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="112" font-family="monospace" font-size="13" fill="#e8b860">$ armies roster</text>
  <text x="360" y="112" font-family="monospace" font-size="12" fill="#d8c880">Display the agent roster</text>

  <!-- ROW 2 — spawn -->
  <rect x="30" y="124" width="720" height="34" fill="url(#ct-row-odd)"/>
  <line x1="30" y1="158" x2="750" y2="158" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="124" x2="340" y2="158" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="146" font-family="monospace" font-size="13" fill="#e8b860">$ armies spawn &lt;agent&gt; --role &lt;role&gt;</text>
  <text x="360" y="146" font-family="monospace" font-size="12" fill="#d8c880">Generate spawn prompt</text>

  <!-- ROW 3 — test -->
  <rect x="30" y="158" width="720" height="34" fill="url(#ct-row-even)"/>
  <line x1="30" y1="192" x2="750" y2="192" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="158" x2="340" y2="192" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="180" font-family="monospace" font-size="13" fill="#e8b860">$ armies test &lt;agent&gt;</text>
  <text x="360" y="180" font-family="monospace" font-size="12" fill="#d8c880">Behavioral fingerprint test</text>

  <!-- ROW 4 — research -->
  <rect x="30" y="192" width="720" height="34" fill="url(#ct-row-odd)"/>
  <line x1="30" y1="226" x2="750" y2="226" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="192" x2="340" y2="226" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="214" font-family="monospace" font-size="13" fill="#e8b860">$ armies research &lt;role&gt;</text>
  <text x="360" y="214" font-family="monospace" font-size="12" fill="#d8c880">Generate research prompt</text>

  <!-- ROW 5 — eligible -->
  <rect x="30" y="226" width="720" height="34" fill="url(#ct-row-even)"/>
  <line x1="30" y1="260" x2="750" y2="260" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="226" x2="340" y2="260" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="248" font-family="monospace" font-size="13" fill="#e8b860">$ armies eligible &lt;agent&gt;</text>
  <text x="360" y="248" font-family="monospace" font-size="12" fill="#d8c880">Check spawn eligibility</text>

  <!-- ROW 6 — sync -->
  <rect x="30" y="260" width="720" height="34" fill="url(#ct-row-odd)"/>
  <line x1="30" y1="294" x2="750" y2="294" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="260" x2="340" y2="294" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="282" font-family="monospace" font-size="13" fill="#e8b860">$ armies sync</text>
  <text x="360" y="282" font-family="monospace" font-size="12" fill="#d8c880">Sync ~/.armies/ with remote</text>

  <!-- ROW 7 — init -->
  <rect x="30" y="294" width="720" height="34" fill="url(#ct-row-even)"/>
  <line x1="30" y1="328" x2="750" y2="328" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="294" x2="340" y2="328" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="316" font-family="monospace" font-size="13" fill="#e8b860">$ armies init</text>
  <text x="360" y="316" font-family="monospace" font-size="12" fill="#d8c880">Create ~/.armies/ directory structure</text>

  <!-- ROW 8 — record -->
  <rect x="30" y="328" width="720" height="34" fill="url(#ct-row-odd)"/>
  <line x1="30" y1="362" x2="750" y2="362" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="340" y1="328" x2="340" y2="362" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="350" font-family="monospace" font-size="13" fill="#e8b860">$ armies record &lt;agent&gt; &lt;note&gt;</text>
  <text x="360" y="350" font-family="monospace" font-size="12" fill="#d8c880">Write service record entry</text>

  <!-- ROW 9 — seed -->
  <rect x="30" y="362" width="720" height="26" fill="url(#ct-row-even)"/>
  <line x1="340" y1="362" x2="340" y2="388" stroke="#8b6914" stroke-width="0.5" opacity="0.5"/>
  <text x="50" y="380" font-family="monospace" font-size="13" fill="#e8b860">$ armies seed [--force]</text>
  <text x="360" y="380" font-family="monospace" font-size="12" fill="#d8c880">Install bundled profiles</text>

  <!-- Decorative double rule above footer -->
  <line x1="30" y1="400" x2="750" y2="400" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>
  <line x1="30" y1="403" x2="750" y2="403" stroke="#c8a050" stroke-width="1.5"/>
  <line x1="30" y1="406" x2="750" y2="406" stroke="#8b6914" stroke-width="0.5" opacity="0.6"/>

  <!-- Bottom band -->
  <rect x="0" y="414" width="780" height="46" fill="#3a1a00"/>

  <!-- Left pentagon insignia in footer -->
  <polygon points="50,426 62,418 74,426 70,440 54,440" fill="none" stroke="#c8a050" stroke-width="1.2" opacity="0.7"/>
  <text x="62" y="435" font-family="serif" font-size="9" fill="#c8a050" text-anchor="middle" opacity="0.7">◈</text>

  <text x="390" y="433" font-family="serif" font-size="12" fill="#c8a050" text-anchor="middle" letter-spacing="4" opacity="0.8">FM 1-01 · ARMIES CLI · 9 COMMANDS</text>
  <text x="390" y="451" font-family="monospace" font-size="10" fill="#8b6914" text-anchor="middle" letter-spacing="2">~/.armies/profiles/ · IF NOT COMMITTED — DIDN'T HAPPEN</text>

  <!-- Right pentagon insignia in footer -->
  <polygon points="706,426 718,418 730,426 726,440 710,440" fill="none" stroke="#c8a050" stroke-width="1.2" opacity="0.7"/>
  <text x="718" y="435" font-family="serif" font-size="9" fill="#c8a050" text-anchor="middle" opacity="0.7">◈</text>

</svg>
