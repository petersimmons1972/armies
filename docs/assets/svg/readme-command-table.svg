<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <title>Armies — Spawn Your Generals</title>
  <defs>
    <radialGradient id="cmd-glow" cx="35%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#c8a050" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c8a050" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cmd-fig-glow" cx="72%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#c8a050" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c8a050" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="#0d0800"/>
  <rect width="900" height="300" fill="none" stroke="#c8a050" stroke-width="3"/>
  <rect x="6" y="6" width="888" height="288" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.3"/>

  <!-- Top classification band -->
  <rect x="0" y="0" width="900" height="34" fill="#3a1a00"/>
  <text x="450" y="22" font-family="serif" font-size="13" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="7">FIELD DEPLOYMENT SYSTEM — ARMIES v1.0</text>

  <!-- Glow halos -->
  <ellipse cx="310" cy="165" rx="240" ry="100" fill="url(#cmd-glow)"/>
  <ellipse cx="640" cy="165" rx="180" ry="100" fill="url(#cmd-fig-glow)"/>

  <!-- Terminal screen -->
  <rect x="50" y="58" width="320" height="184" fill="#050300" rx="6" stroke="#c8a050" stroke-width="1.5"/>
  <rect x="50" y="58" width="320" height="26" fill="#3a1a00" rx="6"/>
  <text x="210" y="75" font-family="monospace" font-size="12" fill="#c8a050" text-anchor="middle" letter-spacing="2">SPAWN TERMINAL</text>
  <g font-family="monospace" font-size="13" fill="#c8a050">
    <text x="64" y="104">$ armies spawn grace-hopper</text>
    <text x="64" y="120">    --role implementer</text>
    <text x="64" y="144" fill="#5a9a30">✓ grace-hopper.md loaded</text>
    <text x="64" y="160" fill="#5a9a30">✓ Role block: implementer</text>
    <text x="64" y="176" fill="#5a9a30">✓ XP: 1250 — Colonel</text>
    <text x="64" y="200" opacity="0.6">▌ Paste into Claude Code…</text>
    <text x="64" y="224" fill="#5a3000" opacity="0.8">────────────────────────────</text>
    <text x="64" y="236" fill="#8b2000">⚠ Eisenhower: 160pt malus</text>
  </g>

  <!-- Arrow: terminal → figure -->
  <path d="M 378,165 Q 430,155 470,165" stroke="#c8a050" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="468,159 478,165 468,171" fill="#c8a050" opacity="0.7"/>

  <!-- General silhouette -->
  <g transform="translate(560, 58)" fill="#c8a050" opacity="0.85">
    <!-- Head -->
    <ellipse cx="60" cy="22" rx="16" ry="18"/>
    <!-- Military cap -->
    <rect x="38" y="8" width="44" height="8" rx="3" fill="#c8a050"/>
    <ellipse cx="60" cy="10" rx="18" ry="6" fill="#c8a050"/>
    <!-- Neck/collar -->
    <rect x="52" y="38" width="16" height="10" rx="2"/>
    <!-- Uniform body -->
    <path d="M 36,48 L 28,148 L 92,148 L 84,48 Z"/>
    <!-- Epaulettes -->
    <rect x="24" y="48" width="14" height="10" rx="2"/>
    <rect x="82" y="48" width="14" height="10" rx="2"/>
    <!-- Medals -->
    <rect x="42" y="66" width="9" height="6" fill="#c83030"/>
    <rect x="53" y="66" width="9" height="6" fill="#2a5a10"/>
    <rect x="64" y="66" width="9" height="6" fill="#c8a050"/>
    <!-- Belt -->
    <rect x="28" y="120" width="64" height="6" fill="#8b6010"/>
    <!-- Trousers -->
    <rect x="36" y="148" width="22" height="68" rx="4"/>
    <rect x="62" y="148" width="22" height="68" rx="4"/>
    <!-- Boots -->
    <ellipse cx="47" cy="216" rx="14" ry="6"/>
    <ellipse cx="73" cy="216" rx="14" ry="6"/>
  </g>

  <!-- Main title -->
  <text x="450" y="212" font-family="serif" font-size="56" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="10" opacity="0.12">ARMIES</text>

  <!-- Bottom band -->
  <rect x="0" y="266" width="900" height="34" fill="#3a1a00"/>
  <text x="450" y="288" font-family="serif" font-size="13" fill="#c8a050" text-anchor="middle" letter-spacing="5" opacity="0.8">PROFILE · XP · ROLE · ACCOUNTABILITY · MISSION</text>

</svg>
