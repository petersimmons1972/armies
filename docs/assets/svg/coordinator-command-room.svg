<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460" width="760" height="460">
  <title>Coordinator Guide — Command from the Map</title>
  <defs>
    <radialGradient id="cc-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c8a050" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#c8a050" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cc-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#050300"/>
    </linearGradient>
    <clipPath id="cc-map-clip">
      <rect x="80" y="56" width="600" height="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="760" height="460" fill="url(#cc-floor)"/>
  <rect width="760" height="460" fill="none" stroke="#c8a050" stroke-width="3"/>
  <rect x="6" y="6" width="748" height="448" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.25"/>

  <!-- Top band -->
  <rect x="0" y="0" width="760" height="44" fill="#3a1a00"/>
  <text x="380" y="29" font-family="serif" font-size="26" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="7">COORDINATORS DIRECT</text>

  <!-- Bottom band -->
  <rect x="0" y="416" width="760" height="44" fill="#3a1a00"/>
  <text x="380" y="440" font-family="serif" font-size="13" fill="#c8a050" text-anchor="middle" letter-spacing="5" opacity="0.8">NEVER EXECUTE — NEVER WRITE — NEVER EDIT</text>

  <!-- Background glow -->
  <ellipse cx="380" cy="200" rx="320" ry="160" fill="url(#cc-glow)"/>

  <!-- Large strategic map display on back wall -->
  <rect x="80" y="56" width="600" height="280" fill="#060d0a" rx="6" stroke="#2a4a3a" stroke-width="2"/>
  <!-- Map grid lines (clipped to map panel) -->
  <g stroke="#1a3a2a" stroke-width="1" opacity="0.8" clip-path="url(#cc-map-clip)">
    <line x1="80" y1="80" x2="680" y2="80"/>
    <line x1="80" y1="120" x2="680" y2="120"/>
    <line x1="80" y1="160" x2="680" y2="160"/>
    <line x1="80" y1="200" x2="680" y2="200"/>
    <line x1="80" y1="240" x2="680" y2="240"/>
    <line x1="80" y1="280" x2="680" y2="280"/>
    <line x1="160" y1="56" x2="160" y2="336"/>
    <line x1="240" y1="56" x2="240" y2="336"/>
    <line x1="320" y1="56" x2="320" y2="336"/>
    <line x1="400" y1="56" x2="400" y2="336"/>
    <line x1="480" y1="56" x2="480" y2="336"/>
    <line x1="560" y1="56" x2="560" y2="336"/>
    <line x1="640" y1="56" x2="640" y2="336"/>
  </g>
  <!-- Tactical markers on map -->
  <circle cx="250" cy="150" r="12" fill="none" stroke="#c83030" stroke-width="2" opacity="0.7"/>
  <circle cx="250" cy="150" r="4" fill="#c83030" opacity="0.7"/>
  <circle cx="420" cy="200" r="8" fill="none" stroke="#5a9a30" stroke-width="2" opacity="0.7"/>
  <circle cx="420" cy="200" r="3" fill="#5a9a30" opacity="0.7"/>
  <circle cx="540" cy="130" r="10" fill="none" stroke="#4a7ab0" stroke-width="2" opacity="0.7"/>
  <!-- Movement arrows on map -->
  <path d="M 250,150 Q 320,140 410,200" stroke="#c8a050" stroke-width="1.5" fill="none" stroke-dasharray="4,2" opacity="0.6"/>
  <path d="M 420,200 L 530,135" stroke="#c8a050" stroke-width="1.5" fill="none" stroke-dasharray="4,2" opacity="0.5"/>

  <!-- Floor / perspective shadow (starts below map panel bottom at y=336) -->
  <path d="M 200,410 L 560,410 L 680,340 L 80,340 Z" fill="#050300" opacity="0.8"/>

  <!-- Commanding officer — back view, center stage -->
  <g transform="translate(380, 200)" fill="#c8a050">
    <!-- Head (back of head) -->
    <ellipse cx="0" cy="-110" rx="18" ry="20" opacity="0.9"/>
    <!-- Military cap from behind -->
    <ellipse cx="0" cy="-124" rx="20" ry="8" fill="#8b6010"/>
    <!-- Neck -->
    <rect x="-7" y="-92" width="14" height="12" rx="2" opacity="0.9"/>
    <!-- Uniform — broad shoulders, back view -->
    <path d="M -36,-80 Q -48,-40 -44,80 L 44,80 Q 48,-40 36,-80 Z" opacity="0.9"/>
    <!-- Epaulettes — prominent -->
    <rect x="-48" y="-80" width="14" height="12" rx="3" fill="#8b6010"/>
    <rect x="34" y="-80" width="14" height="12" rx="3" fill="#8b6010"/>
    <!-- Star clusters on epaulettes -->
    <text x="-41" y="-70" font-family="serif" font-size="8" fill="#c8a050" text-anchor="middle">★★</text>
    <text x="41" y="-70" font-family="serif" font-size="8" fill="#c8a050" text-anchor="middle">★★</text>
    <!-- Belt across back -->
    <rect x="-44" y="20" width="88" height="7" rx="2" fill="#8b6010"/>
    <!-- Right arm extended — pointing at map -->
    <path d="M 36,-50 Q 70,-30 90,-10" stroke="#c8a050" stroke-width="10" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Left arm at side -->
    <path d="M -36,-50 Q -44,0 -42,80" stroke="#c8a050" stroke-width="9" fill="none" stroke-linecap="round" opacity="0.9"/>
    <!-- Trousers -->
    <rect x="-22" y="80" width="18" height="80" rx="4" opacity="0.9"/>
    <rect x="4" y="80" width="18" height="80" rx="4" opacity="0.9"/>
    <!-- Boots -->
    <ellipse cx="-13" cy="160" rx="14" ry="7" fill="#2a1400"/>
    <ellipse cx="13" cy="160" rx="14" ry="7" fill="#2a1400"/>
  </g>

</svg>
