<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <title>Role Class Insignia — Eight Roles of the Armies System</title>
  <desc>Eight role class icons in WWII military insignia style, displayed in a row. Warm gold, cream, and deep burgundy palette.</desc>

  <!-- Background -->
  <rect width="900" height="160" fill="#1a0a02"/>
  <rect x="0" y="0" width="900" height="2" fill="#c8a050" opacity="0.5"/>
  <rect x="0" y="158" width="900" height="2" fill="#c8a050" opacity="0.5"/>

  <!-- Section label -->
  <text x="450" y="18" font-family="serif" font-size="10" fill="#c8a050" text-anchor="middle" letter-spacing="4" opacity="0.8">ROLE CLASSES</text>

  <!-- 8 role insignia badges, evenly spaced -->
  <!-- Each badge: octagonal shape with role symbol and label -->

  <!-- 1. COORDINATOR — compass/star -->
  <g transform="translate(56,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#1a3a7a" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Compass star symbol -->
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#c8a050" stroke-width="2"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#c8a050" stroke-width="2"/>
    <line x1="-14" y1="-14" x2="14" y2="14" stroke="#c8a050" stroke-width="1" opacity="0.6"/>
    <line x1="14" y1="-14" x2="-14" y2="14" stroke="#c8a050" stroke-width="1" opacity="0.6"/>
    <circle cx="0" cy="0" r="5" fill="#c8a050"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">COORDINATOR</text>
  </g>

  <!-- 2. IMPLEMENTER — hammer/anvil -->
  <g transform="translate(168,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#5a1a00" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Wrench/gear symbol -->
    <rect x="-4" y="-20" width="8" height="28" rx="2" fill="#c8a050"/>
    <rect x="-14" y="-22" width="28" height="8" rx="3" fill="#c8a050"/>
    <rect x="-10" y="8" width="20" height="6" rx="2" fill="#c8a050" opacity="0.7"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">IMPLEMENTER</text>
  </g>

  <!-- 3. QA-VALIDATOR — magnifying glass -->
  <g transform="translate(280,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#2a4a00" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Magnifying glass -->
    <circle cx="-3" cy="-5" r="13" fill="none" stroke="#c8a050" stroke-width="2.5"/>
    <line x1="7" y1="5" x2="18" y2="17" stroke="#c8a050" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">QA-VALIDATOR</text>
  </g>

  <!-- 4. PLANNER — drafting triangle -->
  <g transform="translate(392,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#3a1a5a" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Triangle/drawing -->
    <polygon points="0,-18 18,16 -18,16" fill="none" stroke="#c8a050" stroke-width="2"/>
    <line x1="-18" y1="16" x2="0" y2="-18" stroke="#c8a050" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-4" x2="18" y2="16" stroke="#c8a050" stroke-width="1" opacity="0.5"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">PLANNER</text>
  </g>

  <!-- 5. RESEARCHER — open book -->
  <g transform="translate(504,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#1a2a4a" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Open book -->
    <path d="M -18,-12 L -18,14 L 0,18 L 0,-8 Z" fill="#c8a050" opacity="0.8"/>
    <path d="M 18,-12 L 18,14 L 0,18 L 0,-8 Z" fill="#c8a050" opacity="0.6"/>
    <line x1="0" y1="-8" x2="0" y2="18" stroke="#1a2a4a" stroke-width="1.5"/>
    <line x1="-15" y1="-4" x2="-3" y2="-4" stroke="#1a2a4a" stroke-width="1" opacity="0.6"/>
    <line x1="-15" y1="2" x2="-3" y2="2" stroke="#1a2a4a" stroke-width="1" opacity="0.6"/>
    <line x1="-15" y1="8" x2="-3" y2="8" stroke="#1a2a4a" stroke-width="1" opacity="0.6"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">RESEARCHER</text>
  </g>

  <!-- 6. TROUBLESHOOTER — lightning bolt -->
  <g transform="translate(616,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#5a2a00" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Lightning bolt -->
    <polygon points="8,-20 -4,2 4,2 -8,22 10,0 2,0 14,-20" fill="#c8a050"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">TROUBLESHOOTER</text>
  </g>

  <!-- 7. ARTIST — palette/brush -->
  <g transform="translate(728,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#4a0a2a" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Paintbrush -->
    <rect x="-3" y="-20" width="6" height="20" rx="1" fill="#c8a050"/>
    <rect x="-5" y="-22" width="10" height="6" rx="1" fill="#d4b483"/>
    <path d="M -3,0 L 3,0 L 5,16 Q 0,22 -5,16 Z" fill="#c8a050" opacity="0.9"/>
    <!-- Small paint dots -->
    <circle cx="14" cy="-14" r="3" fill="#c8a050" opacity="0.8"/>
    <circle cx="-16" cy="-10" r="2.5" fill="#c8a050" opacity="0.6"/>
    <circle cx="16" cy="6" r="2" fill="#c8a050" opacity="0.5"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">ARTIST</text>
  </g>

  <!-- 8. OBSERVER — eye -->
  <g transform="translate(840,80)">
    <polygon points="0,-38 22,-22 38,0 22,22 0,38 -22,22 -38,0 -22,-22" fill="#1a3a1a" stroke="#c8a050" stroke-width="1.5"/>
    <polygon points="0,-30 16,-16 30,0 16,16 0,30 -16,16 -30,0 -16,-16" fill="none" stroke="#c8a050" stroke-width="0.5" opacity="0.4"/>
    <!-- Eye symbol -->
    <path d="M -18,0 Q 0,-16 18,0 Q 0,16 -18,0 Z" fill="none" stroke="#c8a050" stroke-width="2"/>
    <circle cx="0" cy="0" r="6" fill="#c8a050"/>
    <circle cx="0" cy="0" r="3" fill="#1a3a1a"/>
    <!-- Eyelashes/rays -->
    <line x1="0" y1="-16" x2="0" y2="-20" stroke="#c8a050" stroke-width="1" opacity="0.6"/>
    <line x1="0" y1="16" x2="0" y2="20" stroke="#c8a050" stroke-width="1" opacity="0.6"/>
    <text x="0" y="50" font-family="sans-serif" font-size="7" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="1">OBSERVER</text>
  </g>

  <!-- Connecting banner line -->
  <line x1="30" y1="130" x2="870" y2="130" stroke="#c8a050" stroke-width="0.5" opacity="0.3"/>

</svg>
