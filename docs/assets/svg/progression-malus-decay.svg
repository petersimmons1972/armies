<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <title>Malus Decay Chart — Effective Malus Over Time, Wartime Infographic Style</title>
  <desc>Wartime infographic chart showing how a P0 malus entry (100 raw points) decays from 100 to near-zero over 84 days. Non-decaying permanent entries shown with flat red line. Gold, dark brown palette.</desc>

  <!-- Background -->
  <rect width="700" height="320" fill="#1a0f00"/>
  <rect x="0" y="0" width="700" height="320" fill="none" stroke="#8b6010" stroke-width="2"/>

  <!-- Title -->
  <rect x="0" y="0" width="700" height="32" fill="#3a1a00"/>
  <text x="350" y="21" font-family="serif" font-size="13" font-weight="bold" fill="#c8a050" text-anchor="middle" letter-spacing="4">MALUS DECAY TABLE — P0 INCIDENT (100 RAW POINTS)</text>
  <text x="695" y="21" font-family="monospace" font-size="8" fill="#5a3a00" text-anchor="end">decays: true</text>

  <!-- Chart area -->
  <rect x="60" y="50" width="580" height="220" fill="#0d0800" stroke="#3a1a00" stroke-width="1"/>

  <!-- Grid lines - horizontal (effective malus values) -->
  <g stroke="#2a1500" stroke-width="1" stroke-dasharray="3,3" opacity="0.7">
    <line x1="60" y1="50" x2="640" y2="50"/>   <!-- 100 -->
    <line x1="60" y1="105" x2="640" y2="105"/>  <!-- 75 -->
    <line x1="60" y1="160" x2="640" y2="160"/>  <!-- 50 -->
    <line x1="60" y1="215" x2="640" y2="215"/>  <!-- 25 -->
    <line x1="60" y1="270" x2="640" y2="270"/>  <!-- 0 -->
  </g>

  <!-- Grid lines - vertical (day values) -->
  <g stroke="#2a1500" stroke-width="1" stroke-dasharray="3,3" opacity="0.5">
    <line x1="60" y1="50" x2="60" y2="270"/>    <!-- day 0 -->
    <line x1="129" y1="50" x2="129" y2="270"/>  <!-- day 7 -->
    <line x1="198" y1="50" x2="198" y2="270"/>  <!-- day 14 -->
    <line x1="336" y1="50" x2="336" y2="270"/>  <!-- day 28 -->
    <line x1="474" y1="50" x2="474" y2="270"/>  <!-- day 42 -->
    <line x1="543" y1="50" x2="543" y2="270"/>  <!-- day 56 -->
    <line x1="640" y1="50" x2="640" y2="270"/>  <!-- day 84 -->
  </g>

  <!-- Y axis labels (effective malus) -->
  <g font-family="monospace" font-size="9" fill="#5a3a00" text-anchor="end">
    <text x="55" y="54">100</text>
    <text x="55" y="109">75</text>
    <text x="55" y="164">50</text>
    <text x="55" y="219">25</text>
    <text x="55" y="274">0</text>
  </g>

  <!-- X axis labels (days) -->
  <g font-family="monospace" font-size="9" fill="#5a3a00" text-anchor="middle">
    <text x="60" y="288">0</text>
    <text x="129" y="288">7</text>
    <text x="198" y="288">14</text>
    <text x="336" y="288">28</text>
    <text x="474" y="288">42</text>
    <text x="543" y="288">56</text>
    <text x="640" y="288">84</text>
  </g>
  <text x="350" y="305" font-family="sans-serif" font-size="9" fill="#5a3a00" text-anchor="middle">DAYS SINCE INCIDENT</text>

  <!-- Y axis label -->
  <text x="18" y="165" font-family="sans-serif" font-size="9" fill="#5a3a00" text-anchor="middle" transform="rotate(-90,18,165)">EFFECTIVE MALUS</text>

  <!-- =========== DECAY CURVE — P0 normal (decays: true) =========== -->
  <!-- Points: day 0→100, 7→70.7, 14→50, 28→25, 42→12.5, 56→6.25, 84→1.56 -->
  <!-- Y = 50 + (100 - effectiveMalus) * 2.2  [chart goes 50 at top, 270 at bottom for 0] -->
  <!-- Actually: chartY = 270 - (effectiveMalus/100) * 220 -->
  <!-- day 0: x=60, y=270-(100/100)*220=50 -->
  <!-- day 7: x=129, y=270-(70.7/100)*220=114.5 -->
  <!-- day 14: x=198, y=270-(50/100)*220=160 -->
  <!-- day 28: x=336, y=270-(25/100)*220=215 -->
  <!-- day 42: x=474, y=270-(12.5/100)*220=242.5 -->
  <!-- day 56: x=543, y=270-(6.25/100)*220=256 -->
  <!-- day 84: x=640, y=270-(1.56/100)*220=266.6 -->

  <!-- Decay curve fill area -->
  <path d="M 60,50 C 80,75 105,104 129,115 S 165,145 198,160 S 270,203 336,215 S 430,237 474,243 S 518,253 543,256 L 640,267 L 640,270 L 60,270 Z"
        fill="#8b0000" opacity="0.2"/>

  <!-- Decay curve line -->
  <path d="M 60,50 C 80,75 105,104 129,115 S 165,145 198,160 S 270,203 336,215 S 430,237 474,243 S 518,253 543,256 L 640,267"
        stroke="#c83030" stroke-width="2.5" fill="none"/>

  <!-- Data point markers -->
  <g fill="#c83030">
    <circle cx="60" cy="50" r="5"/>
    <circle cx="129" cy="115" r="4"/>
    <circle cx="198" cy="160" r="4"/>
    <circle cx="336" cy="215" r="4"/>
    <circle cx="474" cy="243" r="4"/>
    <circle cx="543" cy="256" r="4"/>
    <circle cx="640" cy="267" r="4"/>
  </g>

  <!-- Data point annotations -->
  <g font-family="monospace" font-size="8" fill="#c83030">
    <text x="65" y="45">100.0</text>
    <text x="108" y="110">70.7</text>
    <text x="185" y="155">50.0</text>
    <text x="317" y="210">25.0</text>
    <text x="459" y="238">12.5</text>
    <text x="525" y="251">6.3</text>
    <text x="622" y="263">1.6</text>
  </g>

  <!-- Half-life annotation markers -->
  <!-- 1st half-life at day 14 -->
  <line x1="198" y1="50" x2="198" y2="160" stroke="#8b6010" stroke-width="1" stroke-dasharray="2,2" opacity="0.6"/>
  <text x="202" y="65" font-family="sans-serif" font-size="7" fill="#8b6010" opacity="0.8">1st half-life</text>

  <!-- 2nd half-life at day 28 -->
  <line x1="336" y1="50" x2="336" y2="215" stroke="#8b6010" stroke-width="1" stroke-dasharray="2,2" opacity="0.5"/>
  <text x="340" y="65" font-family="sans-serif" font-size="7" fill="#8b6010" opacity="0.7">2nd</text>

  <!-- "effectively negligible" annotation at day 56 -->
  <rect x="445" y="252" width="108" height="16" fill="#1a0f00" opacity="0.8"/>
  <text x="499" y="263" font-family="sans-serif" font-size="7" fill="#8b6010" text-anchor="middle" font-style="italic">effectively negligible</text>

  <!-- PERMANENT LINE — non-decaying entry (malpractice/insubordination) -->
  <line x1="60" y1="50" x2="640" y2="50" stroke="#8b0000" stroke-width="3" stroke-dasharray="8,4" opacity="0.8"/>
  <text x="380" y="46" font-family="sans-serif" font-size="9" fill="#8b0000" text-anchor="middle" font-weight="bold">PERMANENT (malpractice/insubordination)</text>

  <!-- Legend -->
  <g transform="translate(90, 280)">
    <line x1="0" y1="8" x2="20" y2="8" stroke="#c83030" stroke-width="2.5"/>
    <circle cx="10" cy="8" r="3" fill="#c83030"/>
    <text x="24" y="12" font-family="sans-serif" font-size="8" fill="#c8a050">Normal defect (decays: true) — 14-day half-life</text>
    <line x1="200" y1="8" x2="220" y2="8" stroke="#8b0000" stroke-width="3" stroke-dasharray="6,3"/>
    <text x="224" y="12" font-family="sans-serif" font-size="8" fill="#c8a050">Permanent (malpractice) — no decay ever</text>
  </g>

  <!-- Eisenhower annotation — pointing to the permanent line -->
  <text x="620" y="44" font-family="sans-serif" font-size="7" fill="#8b0000" text-anchor="end" font-style="italic">Eisenhower: 160.0 permanent</text>

</svg>
