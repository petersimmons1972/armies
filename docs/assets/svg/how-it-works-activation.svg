<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <title>How It Works — The Model Already Knows</title>
  <defs>

    <!-- Spotlight beam: radiates from apex (right) toward sphere (left) -->
    <linearGradient id="beam-fade" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#D4A574" stop-opacity="0.68"/>
      <stop offset="40%"  stop-color="#D4A574" stop-opacity="0.32"/>
      <stop offset="75%"  stop-color="#D4A574" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Secondary beam fill — warmer core -->
    <linearGradient id="beam-core" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%"   stop-color="#e8c99a" stop-opacity="0.40"/>
      <stop offset="50%"  stop-color="#D4A574" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </linearGradient>

    <!-- Orb clip mask -->
    <clipPath id="orb-clip">
      <circle cx="320" cy="252" r="140"/>
    </clipPath>

    <!-- Illumination wash inside sphere at beam entry point -->
    <radialGradient id="beam-wash" cx="72%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#D4A574" stop-opacity="0.20"/>
      <stop offset="60%"  stop-color="#D4A574" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#D4A574" stop-opacity="0"/>
    </radialGradient>

    <!-- Eisenhower halo — cream glow at figure center -->
    <radialGradient id="ike-halo" cx="50%" cy="45%" r="50%">
      <stop offset="0%"   stop-color="#f8fafc" stop-opacity="0.22"/>
      <stop offset="55%"  stop-color="#f8fafc" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
    </radialGradient>

    <!-- Subtle orb depth — shadow lower-left, bright upper-right -->
    <radialGradient id="orb-depth" cx="62%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#1e3a5f" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#060d18" stop-opacity="0.80"/>
    </radialGradient>

    <!-- Profile box glow -->
    <filter id="box-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- ═══════════════════════════════════════════════
       BACKGROUND
  ════════════════════════════════════════════════ -->
  <rect width="900" height="500" fill="#0F172A"/>

  <!-- Poster frame — double rule, Cassandre convention -->
  <rect x="0"  y="0"  width="900" height="500" fill="none" stroke="#D4A574" stroke-width="3"/>
  <rect x="8"  y="8"  width="884" height="484" fill="none" stroke="#D4A574" stroke-width="0.5" opacity="0.30"/>

  <!-- Top band — header bar -->
  <rect x="0" y="0" width="900" height="44" fill="#080e1a"/>
  <line x1="0" y1="44" x2="900" y2="44" stroke="#D4A574" stroke-width="1" opacity="0.5"/>

  <text x="450" y="29"
        font-family="'Arial Narrow', 'Helvetica Condensed', Arial, sans-serif"
        font-size="12" font-weight="bold" fill="#D4A574"
        text-anchor="middle" letter-spacing="10" opacity="0.90">
    ACTIVATION MECHANICS
  </text>

  <!-- Bottom band -->
  <rect x="0" y="456" width="900" height="44" fill="#080e1a"/>
  <line x1="0" y1="456" x2="900" y2="456" stroke="#D4A574" stroke-width="1" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════
       KNOWLEDGE SPHERE — center-left
       ~280px diameter, centered at (320, 252)
  ════════════════════════════════════════════════ -->

  <!-- Sphere body -->
  <circle cx="320" cy="252" r="140" fill="#0b1525"/>
  <!-- Depth gradient -->
  <circle cx="320" cy="252" r="140" fill="url(#orb-depth)"/>

  <!-- Grid lines — clipped to sphere, precise geometric mesh -->
  <g clip-path="url(#orb-clip)" stroke="#1e293b" stroke-width="0.7" fill="none" opacity="1">
    <!-- Horizontal rules, 25px pitch -->
    <line x1="175" y1="177" x2="465" y2="177"/>
    <line x1="175" y1="202" x2="465" y2="202"/>
    <line x1="175" y1="227" x2="465" y2="227"/>
    <line x1="175" y1="252" x2="465" y2="252"/>
    <line x1="175" y1="277" x2="465" y2="277"/>
    <line x1="175" y1="302" x2="465" y2="302"/>
    <line x1="175" y1="327" x2="465" y2="327"/>
    <!-- Vertical rules, 25px pitch -->
    <line x1="195" y1="108" x2="195" y2="396"/>
    <line x1="220" y1="108" x2="220" y2="396"/>
    <line x1="245" y1="108" x2="245" y2="396"/>
    <line x1="270" y1="108" x2="270" y2="396"/>
    <line x1="295" y1="108" x2="295" y2="396"/>
    <line x1="320" y1="108" x2="320" y2="396"/>
    <line x1="345" y1="108" x2="345" y2="396"/>
    <line x1="370" y1="108" x2="370" y2="396"/>
    <line x1="395" y1="108" x2="395" y2="396"/>
    <line x1="420" y1="108" x2="420" y2="396"/>
    <line x1="445" y1="108" x2="445" y2="396"/>
  </g>

  <!-- Axis cross — stronger center lines -->
  <g clip-path="url(#orb-clip)" stroke="#1e3a5f" stroke-width="1.2" fill="none" opacity="0.8">
    <line x1="175" y1="252" x2="465" y2="252"/>
    <line x1="320" y1="108" x2="320" y2="396"/>
  </g>

  <!-- Beam wash inside sphere — light entering from right -->
  <circle cx="320" cy="252" r="140" fill="url(#beam-wash)" clip-path="url(#orb-clip)"/>

  <!-- Sphere outer rim strokes — architectural precision -->
  <circle cx="320" cy="252" r="140" fill="none" stroke="#2a4a6a" stroke-width="1.8"/>
  <circle cx="320" cy="252" r="138" fill="none" stroke="#1e3a5f" stroke-width="0.6" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════
       DORMANT GHOST FIGURES — barely visible, clipped to sphere
       Geometric suggestions: heads, torsos, arms only
       Color: #1e3a5f — dark steel blue, sleeping in the latent space
  ════════════════════════════════════════════════ -->
  <g clip-path="url(#orb-clip)" fill="#1e3a5f" opacity="0.85">

    <!-- GHOST 1 — upper-left: peaked-cap general (Patton) -->
    <!-- brim -->
    <rect x="222" y="163" width="18" height="3" rx="0.5"/>
    <!-- body cap -->
    <polygon points="224,163 238,163 235,154 227,154"/>
    <!-- head -->
    <ellipse cx="231" cy="173" rx="8" ry="8.5"/>
    <!-- torso -->
    <polygon points="219,181 243,181 246,210 216,210"/>
    <!-- arms -->
    <rect x="211" y="183" width="8" height="18" rx="1"/>
    <rect x="243" y="183" width="8" height="18" rx="1"/>

    <!-- GHOST 2 — upper-right quadrant: naval officer (flat-top cap) -->
    <!-- brim extended -->
    <rect x="356" y="158" width="20" height="3" rx="0.5"/>
    <rect x="358" y="153" width="16" height="6" rx="0.5"/>
    <!-- head -->
    <ellipse cx="366" cy="169" rx="8" ry="8"/>
    <!-- torso -->
    <polygon points="354,177 378,177 381,204 351,204"/>
    <!-- arms -->
    <rect x="346" y="179" width="9" height="16" rx="1"/>
    <rect x="377" y="179" width="9" height="16" rx="1"/>

    <!-- GHOST 3 — lower-left: shorter officer -->
    <!-- head -->
    <ellipse cx="247" cy="305" rx="7" ry="7.5"/>
    <!-- cap -->
    <rect x="240" y="297" width="14" height="3" rx="0.5"/>
    <!-- torso -->
    <polygon points="236,312 258,312 261,336 233,336"/>
    <!-- arms -->
    <rect x="229" y="314" width="8" height="14" rx="1"/>
    <rect x="257" y="314" width="8" height="14" rx="1"/>

    <!-- GHOST 4 — lower-right: seated or smaller figure -->
    <!-- head -->
    <ellipse cx="378" cy="298" rx="7" ry="7"/>
    <!-- cap small -->
    <rect x="371" y="291" width="14" height="3" rx="0.5"/>
    <!-- torso, slightly smaller -->
    <polygon points="367,305 389,305 391,326 365,326"/>
    <!-- arms abbreviated -->
    <rect x="362" y="307" width="6" height="11" rx="1"/>
    <rect x="388" y="307" width="6" height="11" rx="1"/>

    <!-- GHOST 5 — right-center: standing narrow (Montgomery) -->
    <!-- head -->
    <ellipse cx="345" cy="232" rx="6" ry="7"/>
    <!-- beret (flat disc on top) -->
    <ellipse cx="345" cy="225" rx="9" ry="3"/>
    <!-- torso narrow -->
    <polygon points="335,239 355,239 357,264 333,264"/>
    <!-- arms -->
    <rect x="329" y="241" width="7" height="14" rx="1"/>
    <rect x="354" y="241" width="7" height="14" rx="1"/>

    <!-- GHOST 6 — center-upper: faint partial figure, background depth -->
    <ellipse cx="308" cy="192" rx="5" ry="5.5" opacity="0.55"/>
    <rect x="302" y="197" width="10" height="16" rx="1" opacity="0.55"/>

  </g>

  <!-- ═══════════════════════════════════════════════
       SPOTLIGHT BEAM — geometric triangle
       Apex: (724, 252) at profile box left edge
       Wide end fans into sphere entry zone
  ════════════════════════════════════════════════ -->

  <!-- Main beam fill -->
  <polygon
    points="724,252  455,164  455,340"
    fill="url(#beam-fade)"
  />

  <!-- Brighter core triangle — inner narrow beam -->
  <polygon
    points="724,252  480,218  480,286"
    fill="url(#beam-core)"
  />

  <!-- Beam edge rays — crisp geometric hairlines -->
  <line x1="724" y1="252" x2="455" y2="164" stroke="#D4A574" stroke-width="1.0" opacity="0.50"/>
  <line x1="724" y1="252" x2="455" y2="340" stroke="#D4A574" stroke-width="1.0" opacity="0.50"/>
  <!-- Inner edge rays, lighter -->
  <line x1="724" y1="252" x2="480" y2="218" stroke="#D4A574" stroke-width="0.5" opacity="0.28"/>
  <line x1="724" y1="252" x2="480" y2="286" stroke="#D4A574" stroke-width="0.5" opacity="0.28"/>

  <!-- Beam tick marks at intervals — Cassandre's rhythmic linear device -->
  <line x1="650" y1="221" x2="650" y2="217" stroke="#D4A574" stroke-width="0.7" opacity="0.35"/>
  <line x1="600" y1="210" x2="600" y2="205" stroke="#D4A574" stroke-width="0.7" opacity="0.35"/>
  <line x1="550" y1="200" x2="550" y2="194" stroke="#D4A574" stroke-width="0.7" opacity="0.30"/>
  <line x1="650" y1="283" x2="650" y2="287" stroke="#D4A574" stroke-width="0.7" opacity="0.35"/>
  <line x1="600" y1="294" x2="600" y2="299" stroke="#D4A574" stroke-width="0.7" opacity="0.35"/>
  <line x1="550" y1="304" x2="550" y2="310" stroke="#D4A574" stroke-width="0.7" opacity="0.30"/>

  <!-- Beam label — angled along upper edge -->
  <text x="620" y="233"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="8" fill="#D4A574" text-anchor="middle"
        letter-spacing="3" opacity="0.42"
        transform="rotate(-8, 620, 233)">
    TARGETING BEAM
  </text>

  <!-- ═══════════════════════════════════════════════
       EISENHOWER SILHOUETTE — illuminated figure
       Peaked cap, broad shoulders, 5-star insignia
       Cream #f8fafc — snapped out of dormancy
  ════════════════════════════════════════════════ -->

  <!-- Halo behind Ike — soft cream radiance, clipped to sphere -->
  <circle cx="318" cy="248" r="58" fill="url(#ike-halo)" clip-path="url(#orb-clip)"/>

  <g fill="#f8fafc" clip-path="url(#orb-clip)">
    <!-- Peaked cap — 3-part construction -->
    <!-- Brim: flat horizontal rectangle -->
    <rect x="296" y="211" width="48" height="5" rx="0.8"/>
    <!-- Cap body: trapezoid, wider at brim -->
    <polygon points="300,211  340,211  337,196  304,196"/>
    <!-- Crown peak: upward triangle -->
    <polygon points="304,196  337,196  320,187"/>

    <!-- Head — slightly elongated oval -->
    <ellipse cx="320" cy="228" rx="17" ry="18"/>

    <!-- Neck -->
    <rect x="314" y="244" width="12" height="7"/>

    <!-- Torso — broad shouldered trapezoid, Ike's distinctive silhouette -->
    <polygon points="289,250  351,250  357,308  283,308"/>

    <!-- Left arm — angled slightly outward -->
    <polygon points="283,251  289,250  286,292  274,294"/>

    <!-- Right arm -->
    <polygon points="357,251  351,250  354,292  366,294"/>

    <!-- Sam Browne belt line — horizontal rule across torso -->
    <rect x="283" y="274" width="74" height="3" rx="0.5" fill="#c8d4e0" opacity="0.5"/>

    <!-- 5-star rank on collar — row of small stars (simplified as circles) -->
    <circle cx="299" cy="257" r="2.5"/>
    <circle cx="306" cy="255" r="2.5"/>
    <circle cx="313" cy="253" r="2.5"/>
    <circle cx="320" cy="252" r="2.5"/>
    <circle cx="327" cy="253" r="2.5"/>

    <!-- Lapel lines — V collar detail -->
    <polygon points="305,250 315,250 308,270 302,270" fill="#c8d4e0" opacity="0.30"/>
    <polygon points="335,250 325,250 332,270 338,270" fill="#c8d4e0" opacity="0.30"/>
  </g>

  <!-- Ike rim-light — gold accent stroke on leading (right) edge -->
  <g fill="none" clip-path="url(#orb-clip)">
    <ellipse cx="320" cy="228" rx="17" ry="18" stroke="#D4A574" stroke-width="0.8" opacity="0.55"/>
    <polygon points="289,250  351,250  357,308  283,308" stroke="#D4A574" stroke-width="0.7" opacity="0.45"/>
  </g>

  <!-- ═══════════════════════════════════════════════
       PROFILE SOURCE BOX — right side, beam origin
  ════════════════════════════════════════════════ -->

  <!-- Outer box -->
  <rect x="724" y="220" width="148" height="64" rx="2" fill="#0b1525" stroke="#D4A574" stroke-width="2.0"/>
  <!-- Inner inset rule -->
  <rect x="727" y="223" width="142" height="58" rx="1" fill="none" stroke="#D4A574" stroke-width="0.4" opacity="0.35"/>

  <!-- Corner ticks — poster registration marks -->
  <line x1="724" y1="232" x2="716" y2="224" stroke="#D4A574" stroke-width="0.7" opacity="0.40"/>
  <line x1="872" y1="232" x2="880" y2="224" stroke="#D4A574" stroke-width="0.7" opacity="0.40"/>
  <line x1="724" y1="272" x2="716" y2="280" stroke="#D4A574" stroke-width="0.7" opacity="0.40"/>
  <line x1="872" y1="272" x2="880" y2="280" stroke="#D4A574" stroke-width="0.7" opacity="0.40"/>

  <!-- PROFILE label -->
  <text x="798" y="249"
        font-family="'Arial Narrow', 'Helvetica Condensed', Arial, sans-serif"
        font-size="16" font-weight="bold" fill="#D4A574"
        text-anchor="middle" letter-spacing="5">
    PROFILE
  </text>

  <!-- Separator hairline -->
  <line x1="736" y1="255" x2="860" y2="255" stroke="#D4A574" stroke-width="0.6" opacity="0.40"/>

  <!-- Filename subtext -->
  <text x="798" y="270"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="9.5" fill="#D4A574"
        text-anchor="middle" letter-spacing="2" opacity="0.58">
    eisenhower.md
  </text>

  <!-- Beam emission lines from box left edge — precision ticks -->
  <line x1="724" y1="236" x2="712" y2="231" stroke="#D4A574" stroke-width="0.9" opacity="0.55"/>
  <line x1="724" y1="252" x2="708" y2="252" stroke="#D4A574" stroke-width="1.2" opacity="0.75"/>
  <line x1="724" y1="268" x2="712" y2="273" stroke="#D4A574" stroke-width="0.9" opacity="0.55"/>

  <!-- ═══════════════════════════════════════════════
       HEADING TEXT BLOCK — left column
  ════════════════════════════════════════════════ -->

  <!-- Architectural bracket — left margin accent -->
  <polyline points="30,172  20,172  20,332  30,332"
            fill="none" stroke="#D4A574" stroke-width="1.4" opacity="0.42"/>
  <!-- Bracket tick at midpoint -->
  <line x1="20" y1="252" x2="28" y2="252" stroke="#D4A574" stroke-width="0.8" opacity="0.35"/>

  <!-- THE MODEL — primary heading -->
  <text x="100" y="216"
        font-family="'Arial Narrow', 'Helvetica Condensed', Arial, sans-serif"
        font-size="30" font-weight="bold" fill="#f8fafc"
        text-anchor="middle" letter-spacing="6">
    THE MODEL
  </text>

  <!-- Separator rule under heading -->
  <line x1="36" y1="226" x2="162" y2="226" stroke="#D4A574" stroke-width="1.4" opacity="0.65"/>

  <!-- ALREADY KNOWS — secondary line -->
  <text x="100" y="246"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="14" fill="#f8fafc"
        text-anchor="middle" letter-spacing="9" opacity="0.85">
    ALREADY KNOWS
  </text>

  <!-- LATENT SPACE annotation — tertiary, small caps style -->
  <text x="100" y="294"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="8.5" fill="#D4A574"
        text-anchor="middle" letter-spacing="4" opacity="0.50">
    LATENT SPACE
  </text>
  <line x1="44" y1="298" x2="156" y2="298" stroke="#D4A574" stroke-width="0.5" opacity="0.28"/>

  <!-- Small annotation: encoded -->
  <text x="100" y="318"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="7.5" fill="#94a3b8"
        text-anchor="middle" letter-spacing="3" opacity="0.40">
    BILLIONS OF PARAMETERS
  </text>

  <!-- ═══════════════════════════════════════════════
       GEOMETRIC ORNAMENT — center diamond, Cassandre signature
  ════════════════════════════════════════════════ -->
  <polygon points="450,56  457,63  450,70  443,63" fill="#D4A574" opacity="0.55"/>
  <polygon points="450,58  455,63  450,68  445,63" fill="none" stroke="#0F172A" stroke-width="1.2"/>

  <!-- Secondary diamonds flanking center ornament -->
  <polygon points="430,60  434,63  430,66  426,63" fill="none" stroke="#D4A574" stroke-width="0.7" opacity="0.30"/>
  <polygon points="470,60  474,63  470,66  466,63" fill="none" stroke="#D4A574" stroke-width="0.7" opacity="0.30"/>

  <!-- ═══════════════════════════════════════════════
       BOTTOM CAPTION LINE
  ════════════════════════════════════════════════ -->
  <text x="450" y="477"
        font-family="'Arial Narrow', Arial, sans-serif"
        font-size="11.5" fill="#94a3b8"
        text-anchor="middle" letter-spacing="1.5" opacity="0.88">
    The profile does not build a persona. It selects one that already exists.
  </text>

</svg>
