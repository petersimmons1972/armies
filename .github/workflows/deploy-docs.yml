name: Deploy Docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'requirements-docs.txt'
      - 'docker/Dockerfile.docs'
      - 'docker/nginx-docs.conf'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/armies-docs

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch secrets from Infisical
        run: |
          TOKEN=$(curl -s -X POST https://infisical.petersimmons.com/api/v1/auth/universal-auth/login \
            -H "Content-Type: application/json" \
            -d "{\"clientId\":\"$INFISICAL_CLIENT_ID\",\"clientSecret\":\"$INFISICAL_CLIENT_SECRET\"}" \
            | jq -r '.accessToken')
          ARMIES_KUBECONFIG=$(curl -s \
            "https://infisical.petersimmons.com/api/v3/secrets/raw/ARMIES_KUBECONFIG?workspaceSlug=homelab-jz5w&environment=prod&secretPath=/" \
            -H "Authorization: Bearer $TOKEN" \
            | jq -r '.secret.secretValue')
          echo "ARMIES_KUBECONFIG=$ARMIES_KUBECONFIG" >> $GITHUB_ENV
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.docs
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to K8s
        run: |
          mkdir -p ~/.kube
          echo "$ARMIES_KUBECONFIG" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl set image deployment/armies-docs \
            nginx=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n websites
          kubectl rollout status deployment/armies-docs -n websites --timeout=120s
