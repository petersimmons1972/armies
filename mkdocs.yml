site_name: Armies
site_url: https://armies.petersimmons.com
site_description: Multi-agent coordination engine for Claude Code. Historical figures. Earned expertise. Accountable AI.
site_author: Peter Simmons
repo_url: https://github.com/petersimmons1972/armies
repo_name: armies
edit_uri: ""

theme:
  name: material
  custom_dir: docs/overrides
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  logo: assets/img/armies-insignia.svg
  favicon: assets/img/favicon.svg
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

extra_css:
  - assets/css/wwii.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/petersimmons1972/armies
      name: armies on GitHub

nav:
  - Home: index.md
  - Get Started: getting-started.md
  - How It Works: how-it-works.md
  - Reference:
    - Progression System: progression.md
    - Creating Profiles: creating-profiles.md
    - Team Templates: team-templates.md
    - Coordinator Guide: coordinator-guide.md
    - Accountability: accountability.md
    - CLI Reference: cli-reference.md
    - Security: security.md
    - Troubleshooting: troubleshooting.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
